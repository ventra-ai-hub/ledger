<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#16181a" />
  <meta name="color-scheme" content="dark" />
  <title>Ventra Ledger</title>

  <!-- Tailwind Play CDN (JIT, supports arbitrary values) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Guard: if the CDN fails to load, don't blow up the page.
    if (typeof tailwind !== 'undefined') {
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ["'Fraunces'", "serif"],
              sans: ["'DM Sans'", "system-ui", "sans-serif"],
              mono: ["'JetBrains Mono'", "monospace"]
            }
          }
        }
      };
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ============ Ventra dark theme tokens ============ */
    :root {
      --bg:             #16181a;
      --sidebar:        #121315;
      --surface:        #1d1f23;
      --surface-2:      #26282d;
      --surface-raised: #2b2e34;
      --border:         rgba(255,255,255,0.06);
      --border-strong:  rgba(255,255,255,0.10);

      --accent:         #c8b8ef;
      --accent-dim:     #8d7fb1;
      --accent-glow:    rgba(200,184,239,0.10);

      --cream:          #e6e1d7;
      --cream-dim:      #a8a198;

      --text:           #f3f1ec;
      --text-muted:     #9c9a97;
      --text-faint:     #6b6a68;

      --income:         #a3c9a3;
      --income-bg:      rgba(163,201,163,0.12);
      --expense:        #c9a99a;
      --expense-bg:     rgba(201,169,154,0.12);
      --danger:         #d89086;
      --danger-bg:      rgba(216,144,134,0.10);
      --warn:           #d9c28a;

      /* Shadows recomposed for dark surfaces — darker + no warm cast */
      --shadow-card:    0 1px 2px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
      --shadow-field:   0 1px 2px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.06);
      --shadow-pop:     0 12px 32px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
    }

    html, body { background: var(--bg); color: var(--text); }
    body { font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    .font-serif { font-family: 'Fraunces', serif; }
    .font-mono  { font-family: 'JetBrains Mono', monospace; }
    .tabular-nums { font-variant-numeric: tabular-nums; }
    input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.55; cursor: pointer; filter: invert(0.9); }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    ::selection { background: var(--accent); color: var(--bg); }

    @keyframes dropdownIn {
      from { opacity: 0; transform: translateY(-4px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .dropdown-menu { animation: dropdownIn 180ms cubic-bezier(0.22, 1, 0.36, 1); }

    /* ============ Custom dropdown (themed, no native chrome) ============ */
    .dd-trigger { color: var(--text); background-color: var(--surface); }
    .dd-trigger:hover { background-color: var(--surface-2); }
    .dd-trigger:focus-visible { outline: none; box-shadow: var(--shadow-field), 0 0 0 2px var(--accent-glow); }
    .dd-menu { border: 1px solid var(--border-strong); animation: dropdownIn 180ms cubic-bezier(0.22, 1, 0.36, 1); }
    .dd-option { color: var(--text); background: transparent; }
    .dd-option:hover,
    .dd-option:focus { outline: none; background-color: var(--surface-2); }
    .dd-option.dd-active { background-color: var(--surface-2); }
    .dd-option:focus-visible { box-shadow: inset 2px 0 0 var(--accent); }
    .dd-check { color: var(--accent); }
    [data-dropdown][data-open="true"] .dd-chev { transform: rotate(180deg); }

    /* ============ Segmented toggle (restrained active state) ============ */
    .seg-toggle {
      background-color: var(--surface);
      padding: 3px;
      border-radius: 14px;
      display: inline-flex;
      gap: 2px;
      box-shadow: var(--shadow-field);
    }
    .seg-toggle button {
      padding: 6px 14px;
      font: 500 12px/1 'DM Sans', system-ui, sans-serif;
      letter-spacing: 0.02em;
      border-radius: 11px;
      background: transparent;
      color: var(--text-muted);
      transition: background-color 140ms, color 140ms, box-shadow 140ms;
      cursor: pointer;
    }
    .seg-toggle button:hover { color: var(--text); }
    .seg-toggle button.active {
      background-color: var(--surface-2);
      color: var(--accent);
      box-shadow: inset 0 0 0 1px rgba(200,184,239,0.45);
    }
    .seg-toggle button:focus-visible { outline: none; box-shadow: inset 0 0 0 2px var(--accent-glow); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 900ms linear infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.45; }
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .pb-safe { padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); }

    /* ============ Tailwind-class overrides (dark repaint) ============
       The source was authored against Tailwind's `stone` scale for a warm
       light theme. We remap each colour class to our dark tokens so the
       existing class list keeps working without a full search/replace. */

    /* Surfaces */
    .bg-white        { background-color: var(--surface) !important; }
    .bg-stone-50     { background-color: var(--surface-2) !important; }
    .bg-stone-100    { background-color: var(--surface-2) !important; }
    .bg-stone-200    { background-color: var(--surface-raised) !important; }
    .bg-stone-900    { background-color: var(--accent) !important; color: var(--bg) !important; }
    .bg-stone-800    { background-color: var(--accent-dim) !important; color: var(--bg) !important; }
    .bg-red-50       { background-color: var(--danger-bg) !important; }

    /* Hovers */
    .hover\:bg-stone-50:hover   { background-color: var(--surface-2) !important; }
    .hover\:bg-stone-100:hover  { background-color: var(--surface-raised) !important; }
    .hover\:bg-stone-200:hover  { background-color: var(--surface-raised) !important; }
    .hover\:bg-stone-800:hover  { background-color: var(--accent-dim) !important; color: var(--bg) !important; }
    .hover\:bg-red-50:hover     { background-color: var(--danger-bg) !important; }
    .hover\:bg-white\/40:hover  { background-color: rgba(255,255,255,0.04) !important; }

    /* Text */
    .text-stone-50,
    .text-stone-100,
    .text-stone-800,
    .text-stone-900  { color: var(--text) !important; }
    .text-stone-700  { color: var(--text) !important; }
    .text-stone-600  { color: var(--text-muted) !important; }
    .text-stone-500  { color: var(--text-muted) !important; }
    .text-stone-400  { color: var(--text-faint) !important; }
    .text-stone-300  { color: var(--text-muted) !important; }
    .text-red-300    { color: var(--danger) !important; }
    .text-red-700    { color: var(--danger) !important; }
    .text-red-900    { color: var(--danger) !important; }
    .text-emerald-800 { color: var(--income) !important; }
    .text-amber-500  { color: var(--warn) !important; }
    .bg-amber-500    { background-color: var(--warn) !important; }
    .bg-emerald-600  { background-color: var(--income) !important; }

    /* Placeholders */
    .placeholder\:text-stone-400::placeholder { color: var(--text-faint); }

    /* Divide / border colour leaks (original used inline var(--border)) */
    .divide-y > * + * { border-color: var(--border) !important; }

    /* Native form controls on dark */
    select, option { background-color: var(--surface); color: var(--text); }
    option { background-color: var(--surface); }
    input, select, textarea { color: var(--text); caret-color: var(--accent); }
    input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 2px var(--accent-glow); }
    input[type="checkbox"] { accent-color: var(--accent); }

    /* Code chip in Settings */
    code { background-color: var(--surface-2) !important; color: var(--cream); }

    /* Print stylesheet — Tax tab / EOFY pack one-pager stays light-on-white */
    @media print {
      :root {
        --bg: #ffffff; --sidebar: #ffffff;
        --surface: #ffffff; --surface-2: #f7f5f0; --surface-raised: #efece4;
        --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.15);
        --text: #1c1917; --text-muted: #555250; --text-faint: #8a8784;
        --cream: #1c1917; --cream-dim: #555250;
        --income: #4a7a4a; --income-bg: rgba(74,122,74,0.08);
        --expense: #9a5a44; --expense-bg: rgba(154,90,68,0.08);
        --danger: #b44a3a; --warn: #8a6a28;
        --accent: #6a53a6; --accent-dim: #6a53a6; --accent-glow: rgba(106,83,166,0.10);
      }
      html, body { background: white; color: #1c1917; }
      .no-print { display: none !important; }
      .print-only { display: block !important; }
      main { margin: 0 !important; padding: 0 !important; }
      .print-page { padding: 0.5in; }
    }
    .print-only { display: none; }
  </style>
</head>
<body>
  <div id="root">
    <div class="min-h-screen flex items-center justify-center" style="background-color: var(--surface-2);">
      <div class="text-stone-500 text-sm">Loading…</div>
    </div>
  </div>

  <script>
    'use strict';

    // ============ Constants ============
    const STORAGE_KEY = 'ventra-ledger-v1';
    const USER_KEY = 'ventra-ledger-user';
    const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const EXPENSE_CATEGORIES = [
      'Software/SaaS', 'Telephony/Telco', 'Contractors', 'Marketing',
      'Subscriptions', 'Office', 'Travel', 'Professional Fees', 'Bank Fees', 'Other'
    ];
    const CURRENCY_OPTIONS = [
      { value: 'AUD', label: 'AUD — Australian Dollar' },
      { value: 'USD', label: 'USD — US Dollar' },
      { value: 'GBP', label: 'GBP — British Pound' },
      { value: 'EUR', label: 'EUR — Euro' },
      { value: 'NZD', label: 'NZD — New Zealand Dollar' }
    ];

    // 50/50 split is locked by design for Ventra (Dan & Nelson).
    // Kept as settings fields so every downstream calculation still reads
    // `settings.splitA` / `settings.splitB`, but forcibly normalised on load.
    const defaultSettings = {
      partnerA: 'Dan',
      partnerB: 'Nelson',
      splitA: 50,
      splitB: 50,
      currency: 'AUD',
      gstEnabled: false,
      gstRate: 10
    };

    const defaultData = {
      expenses: [],
      income: [],
      uncollected: [],
      loans: [],
      settings: { ...defaultSettings },
      dataModifiedAt: null
    };

    // ============ Helpers ============
    const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4);

    const todayISO = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    };

    const monthKey = (iso) => iso ? iso.slice(0, 7) : '';

    // AU financial year: Jul 1 (year X) – Jun 30 (year X+1) → named FY{X+1}
    const fyFromISO = (iso) => {
      if (!iso) return null;
      const [y, m] = iso.split('-').map(Number);
      return m >= 7 ? y + 1 : y;
    };
    const fyKey = (iso) => {
      const y = fyFromISO(iso);
      return y ? `FY${y}` : '';
    };
    const currentFYNum = () => fyFromISO(todayISO());
    const fyRange = (n) => ({ start: `${n-1}-07-01`, end: `${n}-06-30` });
    const isoInFY = (iso, n) => {
      if (!iso || !n) return false;
      const r = fyRange(n);
      return iso >= r.start && iso <= r.end;
    };

    const fmt = (n, currency = 'AUD') => {
      const num = Number(n) || 0;
      try {
        return new Intl.NumberFormat('en-AU', { style: 'currency', currency, minimumFractionDigits: 2 }).format(num);
      } catch { return `$${num.toFixed(2)}`; }
    };

    const fmtDate = (iso) => {
      if (!iso) return '';
      const [y, m, d] = iso.split('-');
      return `${d}/${m}/${y.slice(-2)}`;
    };

    const relTime = (iso) => {
      if (!iso) return '';
      const t = new Date(iso).getTime();
      if (isNaN(t)) return '';
      const diff = Date.now() - t;
      const min = 60 * 1000, hr = 60 * min, day = 24 * hr;
      if (diff < min) return 'just now';
      if (diff < hr) return `${Math.floor(diff / min)}m ago`;
      if (diff < day) return `${Math.floor(diff / hr)}h ago`;
      if (diff < 7 * day) return `${Math.floor(diff / day)}d ago`;
      const d = new Date(t);
      return `${d.getDate()}/${d.getMonth()+1}/${String(d.getFullYear()).slice(-2)}`;
    };

    const parseFlexDate = (s) => {
      if (!s) return todayISO();
      const str = String(s).trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
      const m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
      if (m) {
        let [, d, mo, y] = m;
        if (y.length === 2) y = '20' + y;
        return `${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      }
      return todayISO();
    };

    const parseAmount = (s) => {
      if (typeof s === 'number') return s;
      if (!s) return 0;
      return parseFloat(String(s).replace(/[$,\s]/g, '')) || 0;
    };

    const toCSV = (rows, headers) => {
      const esc = (v) => {
        const s = v == null ? '' : String(v);
        if (/[",\n]/.test(s)) return `"${s.replace(/"/g, '""')}"`;
        return s;
      };
      return [headers.map(esc).join(','), ...rows.map(r => r.map(esc).join(','))].join('\n');
    };

    const parseCSV = (text) => {
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      if (lines.length === 0) return [];
      const parseLine = (line) => {
        const cells = []; let cur = ''; let inQ = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (inQ) {
            if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
            else if (ch === '"') inQ = false;
            else cur += ch;
          } else {
            if (ch === ',') { cells.push(cur); cur = ''; }
            else if (ch === '"') inQ = true;
            else cur += ch;
          }
        }
        cells.push(cur);
        return cells;
      };
      const headers = parseLine(lines[0]).map(h => h.trim().toLowerCase());
      return lines.slice(1).map(line => {
        const cells = parseLine(line);
        const obj = {};
        headers.forEach((h, i) => obj[h] = (cells[i] || '').trim());
        return obj;
      });
    };

    const download = (filename, content, type = 'text/plain') => {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 100);
    };

    // HTML escaping for user content interpolated into templates
    const esc = (s) => {
      if (s == null) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    };

    // Attribute escaping (stricter — for values inside HTML attributes)
    const attr = (s) => esc(s);

    // ============ Migration ============
    // One-shot: rename legacy `description` → `client` / `counterparty`
    // Ensure all entries have editedBy/editedAt optionals and expenses have category.
    function migrate(data) {
      if (!data || typeof data !== 'object') return { ...defaultData };
      const out = {
        ...defaultData,
        ...data,
        settings: { ...defaultSettings, ...(data.settings || {}) },
      };
      // Lock 50/50 — ignore any stored split values.
      out.settings.splitA = 50;
      out.settings.splitB = 50;
      out.expenses = (out.expenses || []).map(e => ({
        id: e.id || uid(),
        vendor: e.vendor || '',
        date: e.date || todayISO(),
        amount: parseAmount(e.amount),
        category: e.category || '',
        notes: e.notes || '',
        editedBy: e.editedBy || undefined,
        editedAt: e.editedAt || undefined,
        gstInclusive: e.gstInclusive || false
      }));
      out.income = (out.income || []).map(i => ({
        id: i.id || uid(),
        source: i.source || '',
        date: i.date || todayISO(),
        amount: parseAmount(i.amount),
        notes: i.notes || '',
        editedBy: i.editedBy || undefined,
        editedAt: i.editedAt || undefined
      }));
      out.uncollected = (out.uncollected || []).map(u => ({
        id: u.id || uid(),
        // legacy `description` → `client`
        client: u.client || u.description || '',
        date: u.date || todayISO(),
        amount: parseAmount(u.amount),
        collected: !!u.collected,
        assignedTo: u.assignedTo || '',
        notes: u.notes || '',
        editedBy: u.editedBy || undefined,
        editedAt: u.editedAt || undefined
      }));
      out.loans = (out.loans || []).map(l => ({
        id: l.id || uid(),
        // legacy `description` → `counterparty`
        counterparty: l.counterparty || l.description || '',
        date: l.date || todayISO(),
        amount: parseAmount(l.amount),
        direction: l.direction || 'out',
        notes: l.notes || '',
        editedBy: l.editedBy || undefined,
        editedAt: l.editedAt || undefined
      }));
      return out;
    }

    // ============ Storage ============
    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return migrate(defaultData);
        return migrate(JSON.parse(raw));
      } catch (err) {
        console.error('loadData failed:', err);
        return migrate(defaultData);
      }
    }

    function saveData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        return true;
      } catch (err) {
        console.error('saveData failed:', err);
        return false;
      }
    }

    function loadUser() { return localStorage.getItem(USER_KEY) || ''; }
    function saveUser(name) {
      if (name) localStorage.setItem(USER_KEY, name);
      else localStorage.removeItem(USER_KEY);
    }

    // ============ State ============
    const state = {
      data: loadData(),
      userName: loadUser(),
      tab: 'overview',
      period: 'month',               // 'month' | 'fy'
      currentMonth: todayISO().slice(0, 7),
      currentFY: currentFYNum(),
      editingId: null,
      saving: false,
      filterExpense: 'all',          // 'all' or period key
      filterIncome: 'all',
      sortExpense: { field: 'date', dir: 'desc' },
      sortIncome: { field: 'date', dir: 'desc' }
    };

    // Stamp an entry with editedBy + editedAt (from current userName, if set)
    function stamp(entry) {
      const now = new Date().toISOString();
      return {
        ...entry,
        editedAt: now,
        editedBy: state.userName || entry.editedBy || undefined
      };
    }

    // Update state.data via updater fn and re-render. Bumps dataModifiedAt.
    let saveTimer = null;
    function setData(updater) {
      const next = typeof updater === 'function' ? updater(state.data) : updater;
      next.dataModifiedAt = new Date().toISOString();
      state.data = next;
      scheduleSave();
      // Schedule a sync push 3s after the last change. Fully independent of
      // the local 600ms debounce — local saves never wait on the network.
      if (typeof schedulePush === 'function') schedulePush();
      render();
    }

    function scheduleSave() {
      if (saveTimer) clearTimeout(saveTimer);
      state.saving = true;
      paintSaveIndicator();
      saveTimer = setTimeout(() => {
        saveData(state.data);
        state.saving = false;
        paintSaveIndicator();
      }, 600);
    }

    // Flush any pending save synchronously, plus best-effort sync flush via
    // keepalive fetch (sendBeacon can't set Authorization headers).
    function flushSave() {
      if (saveTimer) { clearTimeout(saveTimer); saveTimer = null; }
      saveData(state.data);
      state.saving = false;
      if (typeof sync !== 'undefined' && sync.pushTimer) {
        clearTimeout(sync.pushTimer);
        sync.pushTimer = null;
        // Fire-and-forget; keepalive lets it survive the navigation.
        try { syncPush({ keepalive: true }); } catch {}
      }
    }
    window.addEventListener('beforeunload', flushSave);
    window.addEventListener('pagehide', flushSave);

    // Patch the sidebar save indicator in place (avoids re-render flashing)
    function paintSaveIndicator() {
      document.querySelectorAll('[data-save-dot]').forEach(el => {
        el.className = `w-1.5 h-1.5 rounded-full ${state.saving ? 'bg-amber-500' : 'bg-emerald-600'}`;
      });
      document.querySelectorAll('[data-save-label]').forEach(el => {
        el.textContent = state.saving ? 'Saving…' : 'All changes saved';
      });
    }

    // ============ Sync (encrypted shared Gist) ============
    // Crypto: AES-GCM 256, key from PBKDF2-SHA256 (100k iters), 16-byte salt per
    // gist + 12-byte IV per write. Passphrase never persisted; derived key cached
    // as JWK in sessionStorage so reload doesn't re-prompt mid-session.
    //
    // Wire format in the gist's `ledger.enc` file:
    //   { v, salt: <b64>, iv: <b64>, ciphertext: <b64>,
    //     lastModified: <ISO>, lastEditedBy: <userName> }
    //
    // The token (and the optional gist ID) live in localStorage and are
    // per-device — they are NEVER part of state.data, never synced.

    const SYNC_TOKEN_KEY  = 'ventra-ledger-sync-token';
    const SYNC_GIST_KEY   = 'ventra-ledger-sync-gist';
    const SYNC_KEY_CACHE  = 'ventra-ledger-sync-keyjwk';   // sessionStorage
    const SYNC_SALT_CACHE = 'ventra-ledger-sync-salt';     // sessionStorage
    const GIST_FILENAME   = 'ledger.enc';
    const SYNC_VERSION    = 1;
    const SYNC_DEBOUNCE_MS = 3000;

    // Runtime sync state. status drives the indicator.
    //   unconfigured: no token saved
    //   idle:         configured + last sync OK
    //   pulling/pushing: in flight
    //   offline:      navigator.onLine === false
    //   need-passphrase: have token + gist, but key isn't derived yet
    //   error:        last operation errored
    const sync = {
      status: 'unconfigured',
      error: null,
      lastSyncedAt: null,
      lastEditedBy: null,
      cryptoKey: null,
      pushTimer: null,
      retryTimer: null,
      pendingConflict: null,
    };

    class SyncError extends Error {
      constructor(code, message) { super(message); this.code = code; }
    }

    const _b64enc = (buf) => btoa(String.fromCharCode(...new Uint8Array(buf)));
    const _b64dec = (s) => {
      const bin = atob(s);
      const out = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
      return out;
    };

    function syncToken()  { return localStorage.getItem(SYNC_TOKEN_KEY) || ''; }
    function syncGistId() { return localStorage.getItem(SYNC_GIST_KEY) || ''; }
    function setSyncToken(v) { v ? localStorage.setItem(SYNC_TOKEN_KEY, v) : localStorage.removeItem(SYNC_TOKEN_KEY); }
    function setSyncGistId(v) { v ? localStorage.setItem(SYNC_GIST_KEY, v) : localStorage.removeItem(SYNC_GIST_KEY); }
    function clearSyncKeyCache() {
      sessionStorage.removeItem(SYNC_KEY_CACHE);
      sessionStorage.removeItem(SYNC_SALT_CACHE);
      sync.cryptoKey = null;
    }
    function isSyncConfigured() { return !!syncToken(); }

    async function deriveKey(passphrase, saltBytes) {
      const baseKey = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(passphrase),
        'PBKDF2', false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: saltBytes, iterations: 100_000, hash: 'SHA-256' },
        baseKey,
        { name: 'AES-GCM', length: 256 },
        true,
        ['encrypt', 'decrypt']
      );
    }

    // Resolve a CryptoKey for a given salt. If the in-memory key OR the session
    // cache matches the salt, returns it without prompting. If a passphrase is
    // supplied, always re-derives and replaces the cache.
    async function resolveKey({ passphrase, salt }) {
      const saltB64 = _b64enc(salt);
      if (passphrase) {
        const key = await deriveKey(passphrase, salt);
        sync.cryptoKey = key;
        const jwk = await crypto.subtle.exportKey('jwk', key);
        sessionStorage.setItem(SYNC_KEY_CACHE, JSON.stringify(jwk));
        sessionStorage.setItem(SYNC_SALT_CACHE, saltB64);
        return key;
      }
      const cachedSalt = sessionStorage.getItem(SYNC_SALT_CACHE);
      if (sync.cryptoKey && cachedSalt === saltB64) return sync.cryptoKey;
      const cachedJwk = sessionStorage.getItem(SYNC_KEY_CACHE);
      if (cachedJwk && cachedSalt === saltB64) {
        const key = await crypto.subtle.importKey(
          'jwk', JSON.parse(cachedJwk),
          { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
        );
        sync.cryptoKey = key;
        return key;
      }
      return null;
    }

    async function encryptJSON(obj, key) {
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const ct = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv }, key,
        new TextEncoder().encode(JSON.stringify(obj))
      );
      return { iv: _b64enc(iv), ciphertext: _b64enc(ct) };
    }

    async function decryptJSON(ivB64, ctB64, key) {
      const pt = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv: _b64dec(ivB64) }, key, _b64dec(ctB64)
      );
      try { return JSON.parse(new TextDecoder().decode(pt)); }
      catch { throw new SyncError('format', 'Decrypted blob is not valid JSON'); }
    }

    // GitHub API helpers ----------------------------------------------------

    async function ghFetch(path, opts = {}) {
      const token = syncToken();
      if (!token) throw new SyncError('unconfigured', 'No GitHub token configured');
      return fetch(`https://api.github.com${path}`, {
        ...opts,
        headers: {
          'Accept': 'application/vnd.github+json',
          'Authorization': `Bearer ${token}`,
          'X-GitHub-Api-Version': '2022-11-28',
          ...(opts.headers || {})
        }
      });
    }

    async function syncTestConnection() {
      const r = await ghFetch('/user');
      if (r.status === 401) throw new SyncError('auth', 'Token rejected');
      if (!r.ok) throw new SyncError('http', `GitHub returned ${r.status}`);
      const scopes = (r.headers.get('X-OAuth-Scopes') || '')
        .split(',').map(s => s.trim()).filter(Boolean);
      const user = await r.json();
      return { login: user.login, scopes };
    }

    async function syncPullRaw(gistId) {
      const r = await ghFetch(`/gists/${gistId}`);
      if (r.status === 404) throw new SyncError('not_found', 'Gist not found');
      if (r.status === 401) throw new SyncError('auth', 'Token rejected');
      if (!r.ok) throw new SyncError('http', `GitHub returned ${r.status}`);
      const data = await r.json();
      const file = data.files && data.files[GIST_FILENAME];
      if (!file) throw new SyncError('empty', 'Gist has no ledger.enc yet');
      const content = file.truncated
        ? await (await fetch(file.raw_url)).text()
        : file.content;
      try { return JSON.parse(content); }
      catch { throw new SyncError('format', 'Cloud blob is not valid JSON'); }
    }

    async function syncCreateGist(blobJson) {
      const body = {
        description: 'Ventra Ledger encrypted blob',
        public: false,
        files: { [GIST_FILENAME]: { content: blobJson } }
      };
      const r = await ghFetch('/gists', { method: 'POST', body: JSON.stringify(body) });
      if (!r.ok) throw new SyncError('http', `Create gist failed: ${r.status}`);
      return (await r.json()).id;
    }

    async function syncPatchGist(gistId, blobJson, { keepalive = false } = {}) {
      const body = { files: { [GIST_FILENAME]: { content: blobJson } } };
      const r = await ghFetch(`/gists/${gistId}`, {
        method: 'PATCH', body: JSON.stringify(body), keepalive
      });
      if (!r.ok && !keepalive) {
        // keepalive responses can come back as 0 status — don't throw on flush
        throw new SyncError('http', `Patch gist failed: ${r.status}`);
      }
    }

    // Orchestration ---------------------------------------------------------

    function setSyncStatus(status, message = null) {
      sync.status = status;
      sync.error = (status === 'error' || status === 'offline' || status === 'need-passphrase') ? message : null;
      paintSyncIndicator();
    }

    function handleSyncError(err) {
      // Crypto failures throw DOMException with name === 'OperationError'.
      if (err && (err.name === 'OperationError' || err.code === 'OperationError')) {
        setSyncStatus('error', "Decryption failed — passphrase doesn't match the cloud copy.");
        clearSyncKeyCache();
        return;
      }
      if (err instanceof SyncError) {
        if (err.code === 'auth') return setSyncStatus('error', 'GitHub rejected the token. Generate a new one with the gist scope.');
        if (err.code === 'not_found') return setSyncStatus('error', 'Gist ID not found. Check the ID, or leave blank to create one on the next sync.');
        if (err.code === 'empty')     return setSyncStatus('idle');
        if (err.code === 'unconfigured') return setSyncStatus('unconfigured');
        return setSyncStatus('error', err.message || 'Sync error');
      }
      if (!navigator.onLine) return setSyncStatus('offline', 'You are offline. Will retry when reconnected.');
      const msg = (err && err.message) ? err.message : String(err);
      if (msg.includes('Failed to fetch') || msg.includes('NetworkError')) {
        return setSyncStatus('offline', 'Network error. Will retry when reconnected.');
      }
      setSyncStatus('error', msg);
    }

    function buildBlob() {
      // 16-byte salt: stable per-gist. Reuse cached salt if we have one, else
      // mint a new one (first push from device A).
      let saltB64 = sessionStorage.getItem(SYNC_SALT_CACHE);
      if (!saltB64) {
        const s = crypto.getRandomValues(new Uint8Array(16));
        saltB64 = _b64enc(s);
        sessionStorage.setItem(SYNC_SALT_CACHE, saltB64);
      }
      return {
        v: SYNC_VERSION,
        salt: saltB64,
        lastModified: state.data.dataModifiedAt || new Date().toISOString(),
        lastEditedBy: state.userName || ''
      };
    }

    async function syncPush({ keepalive = false } = {}) {
      if (!isSyncConfigured()) return;
      if (!sync.cryptoKey) {
        // Need passphrase before we can push. Don't auto-prompt — surface state.
        if (!sync.pendingConflict) setSyncStatus('need-passphrase', 'Enter your passphrase in Settings → Sync to push.');
        return;
      }
      if (!navigator.onLine) {
        setSyncStatus('offline', 'Offline. Will retry when reconnected.');
        return;
      }
      setSyncStatus('pushing');
      try {
        const meta = buildBlob();
        const { iv, ciphertext } = await encryptJSON(state.data, sync.cryptoKey);
        const blobJson = JSON.stringify({ ...meta, iv, ciphertext });
        let gistId = syncGistId();
        if (!gistId) {
          gistId = await syncCreateGist(blobJson);
          setSyncGistId(gistId);
        } else {
          await syncPatchGist(gistId, blobJson, { keepalive });
        }
        sync.lastSyncedAt = new Date().toISOString();
        sync.lastEditedBy = meta.lastEditedBy;
        setSyncStatus('idle');
      } catch (err) {
        handleSyncError(err);
      }
    }

    // Pulls and decrypts. Returns { remote, lastModified, lastEditedBy } or null
    // if anything prevented decryption (passphrase missing, error, etc).
    async function syncPull() {
      if (!isSyncConfigured()) return null;
      const gistId = syncGistId();
      if (!gistId) return null;
      if (!navigator.onLine) {
        setSyncStatus('offline', 'Offline. Will retry when reconnected.');
        return null;
      }
      setSyncStatus('pulling');
      try {
        const blob = await syncPullRaw(gistId);
        const saltBytes = _b64dec(blob.salt);
        sessionStorage.setItem(SYNC_SALT_CACHE, blob.salt);   // align cache to gist's salt
        const key = await resolveKey({ salt: saltBytes });
        if (!key) {
          setSyncStatus('need-passphrase', 'Passphrase needed to decrypt cloud ledger.');
          return null;
        }
        const remote = await decryptJSON(blob.iv, blob.ciphertext, key);
        sync.lastSyncedAt = new Date().toISOString();
        sync.lastEditedBy = blob.lastEditedBy;
        setSyncStatus('idle');
        return { remote, lastModified: blob.lastModified, lastEditedBy: blob.lastEditedBy };
      } catch (err) {
        handleSyncError(err);
        return null;
      }
    }

    function schedulePush() {
      if (!isSyncConfigured()) return;
      if (sync.pushTimer) clearTimeout(sync.pushTimer);
      sync.pushTimer = setTimeout(() => {
        sync.pushTimer = null;
        syncPush();
      }, SYNC_DEBOUNCE_MS);
    }

    // Pull on load + conflict resolution.
    async function syncOnLoad() {
      if (!isSyncConfigured()) {
        setSyncStatus('unconfigured');
        return;
      }
      if (!syncGistId()) {
        setSyncStatus('idle');     // first device, nothing to pull
        return;
      }
      const result = await syncPull();
      if (!result) return;          // status already set
      const { remote, lastModified, lastEditedBy } = result;
      const localMod = state.data.dataModifiedAt || '1970-01-01T00:00:00.000Z';
      if (lastModified > localMod) {
        // Cloud strictly newer — surface conflict modal, don't overwrite
        sync.pendingConflict = { remote, lastModified, lastEditedBy };
        showConflictModal();
      } else if (lastModified < localMod) {
        // Local strictly newer — push
        schedulePush();
      }
      // equal → nothing to do
    }

    // Online/offline listeners ----------------------------------------------
    window.addEventListener('online', () => {
      if (sync.retryTimer) { clearTimeout(sync.retryTimer); sync.retryTimer = null; }
      if (isSyncConfigured() && sync.cryptoKey) syncPush();
    });
    window.addEventListener('offline', () => {
      if (isSyncConfigured()) setSyncStatus('offline', 'You are offline. Will retry when reconnected.');
    });

    // Indicator paint — sidebar pill + mobile-tab dot.
    function paintSyncIndicator() {
      const status = sync.status;
      const palette = {
        idle:            { bg: 'var(--income-bg)',  fg: 'var(--income)',     dot: 'var(--income)' },
        pushing:         { bg: 'var(--accent-glow)', fg: 'var(--accent)',    dot: 'var(--accent)', pulse: true },
        pulling:         { bg: 'var(--accent-glow)', fg: 'var(--accent)',    dot: 'var(--accent)', pulse: true },
        offline:         { bg: 'rgba(217,194,138,0.12)', fg: 'var(--warn)',  dot: 'var(--warn)' },
        error:           { bg: 'var(--danger-bg)', fg: 'var(--danger)',      dot: 'var(--danger)' },
        'need-passphrase': { bg: 'var(--danger-bg)', fg: 'var(--danger)',    dot: 'var(--danger)' },
        unconfigured:    null
      }[status] || null;
      const labels = {
        idle:            sync.lastSyncedAt ? `Synced · ${relTime(sync.lastSyncedAt)}` : 'Synced',
        pushing:         'Syncing…',
        pulling:         'Syncing…',
        offline:         'Offline · will retry',
        error:           'Sync failed',
        'need-passphrase': 'Passphrase needed',
        unconfigured:    ''
      };
      const label = labels[status] || '';
      document.querySelectorAll('[data-sync-pill]').forEach(el => {
        if (!palette) { el.style.display = 'none'; return; }
        el.style.display = '';
        el.setAttribute('data-status', status);
        el.style.color = palette.fg;
        el.style.backgroundColor = palette.bg;
        const dot = el.querySelector('[data-sync-dot]');
        if (dot) {
          dot.style.backgroundColor = palette.dot;
          dot.style.animation = palette.pulse ? 'pulse 1.4s ease infinite' : '';
        }
        const lbl = el.querySelector('[data-sync-label]');
        if (lbl) lbl.textContent = label;
      });
      // Mobile: dot on the Settings tab when status is non-idle/unconfigured.
      document.querySelectorAll('[data-mobile-sync-dot]').forEach(el => {
        const show = palette && status !== 'idle';
        el.style.display = show ? '' : 'none';
        if (show) el.style.backgroundColor = palette.dot;
      });
    }

    // ----- Conflict modal -----
    function showConflictModal() {
      const c = sync.pendingConflict;
      if (!c) return;
      const editor = c.lastEditedBy || 'someone';
      const when = c.lastModified ? new Date(c.lastModified).toLocaleString('en-AU') : '';
      const overlay = document.createElement('div');
      overlay.dataset.modal = 'sync-conflict';
      overlay.style.cssText = `
        position: fixed; inset: 0; z-index: 9999;
        background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
        display: flex; align-items: center; justify-content: center;
        padding: 16px;
      `;
      overlay.innerHTML = `
        <div style="
          background: var(--surface-raised); color: var(--text);
          max-width: 460px; padding: 28px; border-radius: 18px;
          box-shadow: var(--shadow-pop);
          font: 400 14px/1.5 'DM Sans', system-ui, sans-serif;
        ">
          <div style="font-family: 'Fraunces', serif; font-size: 22px; font-weight: 300; margin-bottom: 10px;">Cloud has newer changes</div>
          <p style="color: var(--text-muted); margin-bottom: 14px;">
            The cloud copy was last edited by <strong style="color: var(--text);">${esc(editor)}</strong>${when ? ` at <strong style="color: var(--text);">${esc(when)}</strong>` : ''}, after your local copy was last modified.
          </p>
          <p style="color: var(--text-muted); margin-bottom: 22px;">Load the cloud version, or keep your local changes (which will overwrite the cloud on the next push)?</p>
          <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button data-action="conflict-keep-local"
              style="padding: 10px 16px; border-radius: 12px; background: var(--surface); color: var(--text); font-weight: 500; box-shadow: ${'var(--shadow-field)'};">Keep local</button>
            <button data-action="conflict-load-cloud"
              style="padding: 10px 16px; border-radius: 12px; background: var(--accent); color: var(--bg); font-weight: 500; box-shadow: 0 1px 2px rgba(200,184,239,0.25);">Load cloud</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
    }
    function dismissConflictModal() {
      document.querySelectorAll('[data-modal="sync-conflict"]').forEach(el => el.remove());
    }

    // ============ Icons (lucide paths) ============
    const ICON_PATHS = {
      download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/>',
      upload: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/>',
      plus: '<path d="M5 12h14"/><path d="M12 5v14"/>',
      minus: '<path d="M5 12h14"/>',
      trash: '<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/>',
      pencil: '<path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/>',
      check: '<polyline points="20 6 9 17 4 12"/>',
      x: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
      settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
      clock: '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
      chevronDown: '<path d="m6 9 6 6 6-6"/>',
      banknote: '<rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/>',
      receipt: '<path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/>',
