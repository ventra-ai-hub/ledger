        unconfigured: 'Not connected'
      })[sync.status] || sync.status;
      const lastEditedLine = (sync.status === 'idle' && sync.lastEditedBy)
        ? `<div class="text-xs text-stone-500 mt-1">Last edit by <strong class="text-stone-800">${esc(sync.lastEditedBy)}</strong></div>` : '';

      const syncCard = card(`
        <div class="flex items-start justify-between gap-3 mb-4">
          <h2 class="text-sm font-medium text-stone-900">Shared sync</h2>
          <div class="text-[10px] tracking-[0.1em] uppercase" style="color: ${sync.status === 'idle' ? 'var(--income)' : sync.status === 'unconfigured' ? 'var(--text-muted)' : 'var(--accent)'};">${esc(syncStatusLabel)}</div>
        </div>

        <div class="rounded-2xl p-4 mb-4 text-xs leading-relaxed" style="background: var(--accent-glow); color: var(--text); border: 1px solid rgba(200,184,239,0.2);">
          <strong>This ledger is shared with your business partner.</strong>
          Use the same Gist ID + passphrase on both devices. Each person should generate their <em>own</em> GitHub token.
          ${state.userName ? `Signed in on this device as <strong>${esc(state.userName)}</strong>.` : 'Set your name in the section below so your edits are stamped.'}
        </div>

        <div class="rounded-2xl p-4 mb-4 text-xs" style="background: var(--danger-bg); color: var(--text); border: 1px solid rgba(216,144,134,0.2);">
          ⚠ The token is stored in this device's localStorage in plaintext. Anyone with access to your browser profile can read it. Use a token scoped to <strong>gist</strong> only.
        </div>

        <form data-sync-form class="grid grid-cols-1 gap-3" onsubmit="return false;">
          <div>
            ${label('GitHub personal access token (gist scope)')}
            ${textField({ type: 'password', value: syncToken(), field: 'syncToken', placeholder: 'ghp_… or github_pat_…' })}
          </div>
          <div>
            ${label('Encryption passphrase')}
            ${textField({ type: 'password', value: '', field: 'syncPassphrase', placeholder: sync.cryptoKey ? '✓ stored in this session' : 'Set a strong passphrase — same on both devices' })}
          </div>
          <div>
            ${label('Gist ID (leave blank on first device)')}
            ${textField({ value: syncGistId(), field: 'syncGistId', placeholder: 'optional — paste from primary device' })}
          </div>
        </form>

        ${sync.status === 'error' && sync.error ? `<div class="mt-3 text-xs" style="color: var(--danger);">⚠ ${esc(sync.error)}</div>` : ''}
        ${sync.status === 'need-passphrase' && sync.error ? `<div class="mt-3 text-xs" style="color: var(--accent);">${esc(sync.error)}</div>` : ''}
        ${lastEditedLine}

        <div class="mt-5 flex flex-wrap items-center gap-2">
          ${button({ children: 'Save & sync now', variant: 'accent', action: 'sync-save-and-push' })}
          ${button({ children: 'Test connection', variant: 'secondary', size: 'sm', action: 'sync-test' })}
          ${syncToken() ? button({ children: 'Disconnect', variant: 'danger', size: 'sm', action: 'sync-disconnect' }) : ''}
        </div>

        <div class="mt-4 text-[11px] text-stone-500">
          Your name is stored per-device in <code class="px-1 py-0.5 rounded">ventra-ledger-user</code> and is <strong>not synced</strong>. Each partner sets their own name on their own device.
        </div>
      `, 'p-6');

      const userCard = card(`
        <h2 class="text-sm font-medium text-stone-900 mb-1">Your name on this device</h2>
        <p class="text-sm text-stone-500 mb-4">
          Stamps entries you add or edit with your name so your partner can see who did what.
          Stored on this device only — <strong>not synced</strong>. Each person should set their own name on their own device.
        </p>
        <form data-user-form class="grid grid-cols-1 md:grid-cols-3 gap-3" onsubmit="return false;">
          <div class="md:col-span-2">
            ${textField({ value: state.userName, field: 'userName', placeholder: 'e.g. Dan' })}
          </div>
          <div class="flex items-stretch">
            ${button({ children: 'Save', variant: 'accent', action: 'save-username', className: 'w-full' })}
          </div>
        </form>
        ${state.userName ? `<div class="text-xs text-stone-500 mt-3">Currently signed in as <strong class="text-stone-800">${esc(state.userName)}</strong>.</div>` : ''}
      `, 'p-6');

      const dataRecoveryCard = card(`
        <h2 class="text-sm font-medium text-stone-900 mb-1">Data recovery</h2>
        <p class="text-sm text-stone-500 mb-2">
          For the accountant at EOFY, use <strong class="text-stone-800">Tax → Generate EOFY Pack</strong> —
          it produces one ZIP with CSVs and PDFs scoped to a single financial year.
        </p>
        <p class="text-sm text-stone-500 mb-2">
          If something is broken, or you need a raw full-data dump across every FY, use
          <strong class="text-stone-800">Export JSON</strong> below. It reads straight from
          <code class="px-1 py-0.5 rounded">localStorage</code> and works even if cloud sync is
          broken or mis-configured.
        </p>
        <p class="text-sm mb-4" style="color: var(--income);">
          Plaintext export always works. You never need the passphrase to recover your data from this device.
        </p>
        <div class="flex flex-wrap gap-2">
          ${button({ children: `${icon('download', 14)} Export JSON (escape hatch)`, variant: 'secondary', action: 'export-json-raw' })}
          <input type="file" accept=".json" class="hidden" data-json-input />
          ${button({ children: `${icon('upload', 14)} Import JSON`, variant: 'secondary', action: 'import-json' })}
        </div>
      `, 'p-6');

      const dangerCard = card(`
        <h2 class="text-sm font-medium text-red-900 mb-1">Danger zone</h2>
        <p class="text-sm text-stone-500 mb-4">Wipe all ledger data on this device. Export a backup first if you might need it.</p>
        ${button({ children: `${icon('trash', 14)} Reset all data`, variant: 'danger', action: 'reset-all' })}
      `, 'p-6');

      return `
        <div class="space-y-6 max-w-3xl">
          <div>
            <div class="text-[11px] tracking-[0.15em] uppercase text-stone-500 mb-2">Configuration</div>
            <h1 class="font-serif text-4xl font-light text-stone-900 leading-none">Settings</h1>
          </div>
          ${partnersCard}
          ${syncCard}
          ${gstCard}
          ${userCard}
          ${dataRecoveryCard}
          ${dangerCard}
        </div>`;
    }

    // Read direct from localStorage regardless of current in-memory state —
    // escape hatch if sync got confused or the page is misbehaving.
    function actExportJsonRaw() {
      try {
        flushSave(); // write any pending debounced save first
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : state.data;
        const payload = JSON.stringify(parsed, null, 2);
        download(`ventra-ledger-${todayISO()}.json`, payload, 'application/json');
      } catch (err) {
        // Last-resort fallback — dump in-memory state
        alert('Could not read localStorage; dumping in-memory ledger instead.');
        download(`ventra-ledger-${todayISO()}.json`, JSON.stringify(state.data, null, 2), 'application/json');
      }
    }

    async function actImportJson(file) {
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        if (!parsed || typeof parsed !== 'object') throw new Error('Invalid');
        const merge = confirm('Click OK to MERGE with existing data.\nClick Cancel to REPLACE all current data.');
        if (merge) {
          setData(d => migrate({
            expenses: [...d.expenses, ...(parsed.expenses || [])],
            income: [...d.income, ...(parsed.income || [])],
            uncollected: [...d.uncollected, ...(parsed.uncollected || [])],
            loans: [...d.loans, ...(parsed.loans || [])],
            settings: d.settings
          }));
          alert('Imported and merged.');
        } else {
          setData(() => migrate(parsed));
          alert('Imported and replaced.');
        }
      } catch (err) {
        alert('Could not read that file.');
      }
    }

    function actSaveSettings() {
      const form = document.querySelector('[data-settings-form]');
      if (!form) return;
      const partnerA = (readField(form, 'partnerA') || '').trim() || 'Partner A';
      const partnerB = (readField(form, 'partnerB') || '').trim() || 'Partner B';
      const currency = readField(form, 'currency') || 'AUD';
      // Split is hardcoded 50/50 by design — not editable.
      setData(d => ({ ...d, settings: { ...d.settings, partnerA, partnerB, splitA: 50, splitB: 50, currency } }));
    }

    function actSaveGst() {
      const form = document.querySelector('[data-gst-form]');
      if (!form) return;
      const enabled = !!form.querySelector('[data-field="gstEnabled"]').checked;
      const rate = Math.max(0, Math.min(100, Number(readField(form, 'gstRate')) || 10));
      setData(d => ({ ...d, settings: { ...d.settings, gstEnabled: enabled, gstRate: rate } }));
    }

    function actSaveUsername() {
      const form = document.querySelector('[data-user-form]');
      if (!form) return;
      const name = (readField(form, 'userName') || '').trim();
      state.userName = name;
      saveUser(name);
      render();
    }

    function actResetAll() {
      if (!confirm('Delete ALL ledger data on this device? This can not be undone.')) return;
      if (!confirm('Really delete? Your partner\'s copy (if synced) is not affected.')) return;
      setData(d => migrate({ ...defaultData, settings: d.settings }));
    }

    // ----- Sync actions -----

    async function actSyncSaveAndPush() {
      const form = document.querySelector('[data-sync-form]');
      if (!form) return;
      const tokenIn  = (readField(form, 'syncToken') || '').trim();
      const passIn   = (readField(form, 'syncPassphrase') || '');
      const gistIdIn = (readField(form, 'syncGistId') || '').trim();

      if (!tokenIn) {
        showToast('A GitHub token is required.', 'error');
        return;
      }

      // Persist token + gist ID changes immediately
      setSyncToken(tokenIn);
      setSyncGistId(gistIdIn);

      try {
        // If user supplied a passphrase, derive a fresh key. We need a salt;
        // if a gist ID exists, fetch its salt first; otherwise mint one.
        if (passIn) {
          let saltBytes;
          if (gistIdIn) {
            try {
              const blob = await syncPullRaw(gistIdIn);
              saltBytes = _b64dec(blob.salt);
            } catch (err) {
              if (err && err.code === 'empty') {
                saltBytes = crypto.getRandomValues(new Uint8Array(16));
              } else { handleSyncError(err); render(); return; }
            }
          } else {
            saltBytes = crypto.getRandomValues(new Uint8Array(16));
          }
          await resolveKey({ passphrase: passIn, salt: saltBytes });
        }

        // If we have a gist ID + key, prefer pulling & checking for newer cloud
        if (syncGistId() && sync.cryptoKey) {
          const result = await syncPull();
          // If pull errored (e.g. decryption failure), abort — don't push and
          // overwrite cloud with local junk. Status is already set.
          if (sync.status === 'error') { render(); return; }
          if (result) {
            const localMod = state.data.dataModifiedAt || '1970-01-01T00:00:00.000Z';
            if (result.lastModified > localMod) {
              const localEmpty = (state.data.expenses.length + state.data.income.length
                + state.data.uncollected.length + state.data.loans.length) === 0;
              if (localEmpty) {
                // First-time configuration with existing cloud data — adopt
                // silently. No "conflict" with a fresh device.
                const next = migrate(result.remote);
                next.dataModifiedAt = result.lastModified;
                state.data = next;
                saveData(next);
                sync.lastEditedBy = result.lastEditedBy;
                render();
                showToast('Loaded ledger from cloud.', 'success');
                return;
              }
              sync.pendingConflict = result;
              showConflictModal();
              render();
              return;
            }
          }
        }

        await syncPush();
        if (sync.status === 'idle') showToast('Synced to cloud.', 'success');
      } catch (err) {
        handleSyncError(err);
      }
      render();
    }

    async function actSyncTest() {
      try {
        const r = await syncTestConnection();
        const broadScopes = r.scopes.filter(s => s !== 'gist');
        if (broadScopes.length) {
          showToast(`Connected as ${r.login}. Token has scopes beyond 'gist': ${broadScopes.join(', ')}. Consider using a token scoped to gist only.`, 'info');
        } else {
          showToast(`Connected as ${r.login}. Scopes: ${r.scopes.join(', ') || '(none)'} ✓`, 'success');
        }
      } catch (err) {
        handleSyncError(err);
        showToast(`Test failed: ${err.message || err}`, 'error');
      }
      render();
    }

    function actSyncDisconnect() {
      if (!confirm('Disconnect sync on this device? The token, gist ID, and cached passphrase will be cleared. Your local ledger data is untouched.')) return;
      setSyncToken('');
      setSyncGistId('');
      clearSyncKeyCache();
      if (sync.pushTimer) { clearTimeout(sync.pushTimer); sync.pushTimer = null; }
      setSyncStatus('unconfigured');
      render();
    }

    function actConflictLoadCloud() {
      const c = sync.pendingConflict;
      if (!c) return;
      // Replace local with cloud, preserving the cloud's dataModifiedAt so we
      // don't bounce the timestamp forward and trigger an unnecessary push.
      const next = migrate(c.remote);
      next.dataModifiedAt = c.lastModified;
      state.data = next;
      saveData(next);
      sync.pendingConflict = null;
      dismissConflictModal();
      render();
      showToast('Loaded cloud copy.', 'success');
    }

    function actConflictKeepLocal() {
      sync.pendingConflict = null;
      dismissConflictModal();
      // Force an immediate push so cloud catches up
      schedulePush();
      // Also try a sooner push than 3s
      if (sync.pushTimer) { clearTimeout(sync.pushTimer); sync.pushTimer = null; }
      syncPush();
      render();
    }

    const VIEW_RENDERERS = {
      overview: viewOverview,
      expenses: viewExpenses,
      income: viewIncome,
      uncollected: viewUncollected,
      loans: viewLoans,
      tax: viewTax,
      settings: viewSettings
    };

    // ============ Render ============
    const root = document.getElementById('root');

    function render() {
      const renderer = VIEW_RENDERERS[state.tab] || viewOverview;
      root.innerHTML = layout(renderer());
      // Re-paint sync indicator after every render so the sidebar pill /
      // mobile dot reflect current sync.status across tab switches.
      if (typeof paintSyncIndicator === 'function') paintSyncIndicator();
    }

    // ============ Dropdown open/close (DOM-driven) ============
    function closeAllDropdowns(exceptEl) {
      document.querySelectorAll('[data-dropdown][data-open="true"]').forEach(w => {
        if (w !== exceptEl) closeDropdown(w);
      });
    }
    function openDropdown(wrap) {
      wrap.dataset.open = 'true';
      const menu = wrap.querySelector('[data-dd-menu]');
      const trigger = wrap.querySelector('.dd-trigger');
      if (menu) menu.style.display = 'block';
      if (trigger) trigger.setAttribute('aria-expanded', 'true');
      const toFocus = wrap.querySelector('[role="option"][aria-selected="true"]') || wrap.querySelector('[role="option"]');
      if (toFocus) setTimeout(() => toFocus.focus({ preventScroll: true }), 0);
    }
    function closeDropdown(wrap) {
      wrap.dataset.open = 'false';
      const menu = wrap.querySelector('[data-dd-menu]');
      const trigger = wrap.querySelector('.dd-trigger');
      if (menu) menu.style.display = 'none';
      if (trigger) trigger.setAttribute('aria-expanded', 'false');
    }

    // ============ Event delegation ============
    // Single click handler dispatches on [data-action], delegating to `dispatch`
    // so internal actions (like dd-select) can forward to another handler.
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      dispatch(el.dataset.action, el);
    });

    function dispatch(action, el) {
      // Tab navigation
      if (action === 'tab') {
        state.tab = el.dataset.tab;
        state.editingId = null;
        closeAllDropdowns();
        window.scrollTo(0, 0);
        return render();
      }

      // Period mode toggle
      if (action === 'set-period-mode') {
        state.period = el.dataset.mode;
        closeAllDropdowns();
        return render();
      }

      // Dropdown open/close (DOM-driven, no render)
      if (action === 'dd-toggle') {
        const id = el.dataset.dd;
        const wrap = document.querySelector(`[data-dropdown="${CSS.escape(id)}"]`);
        if (!wrap) return;
        closeAllDropdowns(wrap);
        if (wrap.dataset.open === 'true') closeDropdown(wrap);
        else openDropdown(wrap);
        return;
      }

      // Dropdown option selection — update DOM + hidden input, then forward
      // any `data-emit` action (e.g. pick-month, pick-fy, set-filter).
      if (action === 'dd-select') {
        const id = el.dataset.dd;
        const wrap = document.querySelector(`[data-dropdown="${CSS.escape(id)}"]`);
        const value = el.dataset.value;
        const labelText = el.dataset.label;
        if (wrap) {
          wrap.dataset.value = value;
          const hidden = wrap.querySelector('input[type="hidden"][data-field]');
          if (hidden) hidden.value = value;
          const labelEl = wrap.querySelector('[data-dd-label]');
          if (labelEl) {
            labelEl.textContent = labelText;
            labelEl.style.color = 'var(--text)';
          }
          wrap.querySelectorAll('[role="option"]').forEach(opt => {
            const isSel = opt.dataset.value === value;
            opt.setAttribute('aria-selected', String(isSel));
            opt.classList.toggle('dd-active', isSel);
            const check = opt.querySelector('.dd-check');
            if (check) check.style.visibility = isSel ? 'visible' : 'hidden';
          });
          closeDropdown(wrap);
          const trigger = wrap.querySelector('.dd-trigger');
          if (trigger) trigger.focus({ preventScroll: true });
        }
        if (el.dataset.emit) dispatch(el.dataset.emit, el);
        return;
      }

      // Period picker selections (fired via dd-select forwarding)
      if (action === 'pick-month') { state.currentMonth = el.dataset.value; return render(); }
      if (action === 'pick-fy')    { state.currentFY = Number(el.dataset.value); return render(); }

      // Number field +/– step
      if (action === 'num-step') {
        const target = document.getElementById(el.dataset.target);
        if (!target) return;
        const delta = Number(el.dataset.delta) || 0;
        const cur = parseAmount(target.value);
        const next = Math.max(0, cur + delta);
        target.value = next.toFixed(2);
        target.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }

      // Ledger: add / edit / delete / filter / sort / csv
      if (action === 'add-entry') return actAddEntry(el.dataset.kind);
      if (action === 'start-edit') { state.editingId = el.dataset.id; return render(); }
      if (action === 'cancel-edit') { state.editingId = null; return render(); }
      if (action === 'save-edit') return actSaveEdit(el.dataset.kind, el.dataset.id);
      if (action === 'delete-entry') return actDeleteEntry(el.dataset.kind, el.dataset.id);

      if (action === 'set-filter') {
        const ddid = el.dataset.dd || '';
        const kind = ddid.replace(/^filter-/, '');
        const key = kind === 'expense' ? 'filterExpense' : 'filterIncome';
        state[key] = el.dataset.value;
        return render();
      }

      if (action === 'sort') {
        const kind = el.dataset.kind;
        const field = el.dataset.field;
        const key = kind === 'expense' ? 'sortExpense' : 'sortIncome';
        const cur = state[key];
        state[key] = cur.field === field
          ? { field, dir: cur.dir === 'asc' ? 'desc' : 'asc' }
          : { field, dir: 'asc' };
        return render();
      }

      if (action === 'csv-export') return actCsvExport(el.dataset.kind);
      if (action === 'csv-import') {
        const fi = document.querySelector(`[data-csv-input="${el.dataset.kind}"]`);
        if (fi) fi.click();
        return;
      }

      // Uncollected
      if (action === 'add-uncollected') return actAddUncollected();
      if (action === 'toggle-collected') return actToggleCollected(el.dataset.id);
      if (action === 'delete-uncollected') return actDeleteUncollected(el.dataset.id);

      // Loans
      if (action === 'add-loan') return actAddLoan();
      if (action === 'delete-loan') return actDeleteLoan(el.dataset.id);

      // Tax
      if (action === 'tax-csv-export') return actTaxCsvExport();
      if (action === 'tax-print') return actTaxPrint();
      if (action === 'eofy-pack') return actGenerateEofyPack();

      // Settings
      if (action === 'save-settings') return actSaveSettings();
      if (action === 'save-gst') return actSaveGst();
      if (action === 'save-username') return actSaveUsername();
      if (action === 'reset-all') return actResetAll();
      if (action === 'export-json-raw') return actExportJsonRaw();
      if (action === 'import-json') {
        const fi = document.querySelector('[data-json-input]');
        if (fi) fi.click();
        return;
      }

      // Sync
      if (action === 'sync-save-and-push') return actSyncSaveAndPush();
      if (action === 'sync-test')          return actSyncTest();
      if (action === 'sync-disconnect')    return actSyncDisconnect();
      if (action === 'open-sync-settings') {
        state.tab = 'settings';
        render();
        // scroll the sync card into view after render
        setTimeout(() => {
          const card = document.querySelector('[data-sync-form]');
          if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 0);
        return;
      }
      if (action === 'conflict-load-cloud') return actConflictLoadCloud();
      if (action === 'conflict-keep-local') return actConflictKeepLocal();
    }

    // ============ Dropdown keyboard navigation ============
    document.addEventListener('keydown', (e) => {
      // If a dropdown trigger is focused and closed, Enter/Space/ArrowDown opens it.
      const trigger = e.target.closest && e.target.closest('.dd-trigger');
      if (trigger) {
        const wrap = trigger.closest('[data-dropdown]');
        const isOpen = wrap && wrap.dataset.open === 'true';
        if (!isOpen && (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown')) {
          e.preventDefault();
          if (wrap) { closeAllDropdowns(wrap); openDropdown(wrap); }
          return;
        }
      }

      // If any dropdown is open, intercept navigation keys.
      const openDd = document.querySelector('[data-dropdown][data-open="true"]');
      if (!openDd) return;

      if (e.key === 'Escape') {
        e.preventDefault();
        closeDropdown(openDd);
        const trig = openDd.querySelector('.dd-trigger');
        if (trig) trig.focus({ preventScroll: true });
        return;
      }
      if (e.key === 'Tab') {
        closeDropdown(openDd);
        return;
      }
      if (e.key === 'Enter' || e.key === ' ') {
        const opt = document.activeElement && document.activeElement.closest && document.activeElement.closest('[role="option"]');
        if (opt && openDd.contains(opt)) {
          e.preventDefault();
          opt.click();
          return;
        }
      }
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const options = Array.from(openDd.querySelectorAll('[role="option"]'));
        const cur = options.indexOf(document.activeElement);
        const next = e.key === 'ArrowDown'
          ? (cur < 0 ? 0 : (cur + 1) % options.length)
          : (cur <= 0 ? options.length - 1 : cur - 1);
        options[next] && options[next].focus({ preventScroll: false });
        return;
      }
      if (e.key === 'Home') {
        e.preventDefault();
        const first = openDd.querySelector('[role="option"]');
        first && first.focus({ preventScroll: false });
        return;
      }
      if (e.key === 'End') {
        e.preventDefault();
        const all = openDd.querySelectorAll('[role="option"]');
        const last = all[all.length - 1];
        last && last.focus({ preventScroll: false });
        return;
      }
    });

    // File input change handler (CSV + JSON imports)
    document.addEventListener('change', (e) => {
      const csvInput = e.target.closest('[data-csv-input]');
      if (csvInput) {
        const kind = csvInput.dataset.csvInput;
        const file = csvInput.files && csvInput.files[0];
        if (file) actCsvImport(kind, file);
        csvInput.value = '';
        return;
      }
      const jsonInput = e.target.closest('[data-json-input]');
      if (jsonInput) {
        const file = jsonInput.files && jsonInput.files[0];
        if (file) actImportJson(file);
        jsonInput.value = '';
      }
    });

    // Enter-to-submit in add forms (feels more like the React original)
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const form = e.target.closest && e.target.closest('[data-add-form]');
