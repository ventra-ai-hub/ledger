    // ============ EOFY Pack ============
    // Bundle: 7 files (CSVs + 2 PDFs) zipped as ventra-eofy-pack-FY{year}.zip.
    // JSZip + html2pdf are loaded on-demand so the normal app boot stays fast.

    const JSZIP_URL = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    const JSPDF_URL = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js';

    function loadScriptOnce(url) {
      return new Promise((resolve, reject) => {
        if (document.querySelector(`script[data-src="${url}"]`)) return resolve();
        const s = document.createElement('script');
        s.src = url;
        s.dataset.src = url;
        s.onload = () => resolve();
        s.onerror = () => reject(new Error(`Failed to load ${url}`));
        document.head.appendChild(s);
      });
    }
    async function ensureJSZip() { if (!window.JSZip) await loadScriptOnce(JSZIP_URL); return window.JSZip; }
    async function ensureJsPDF() {
      if (!(window.jspdf && window.jspdf.jsPDF)) await loadScriptOnce(JSPDF_URL);
      return window.jspdf.jsPDF;
    }

    // CSV with UTF-8 BOM so Excel on Windows correctly detects the encoding.
    function toCSVWithBOM(rows, headers) { return '﻿' + toCSV(rows, headers); }

    // Category → filename slug (e.g. "Software/SaaS" → "software-saas")
    function slugCategory(s) {
      const slug = (s || 'uncategorised').toLowerCase()
        .replace(/[\s/\\_]+/g, '-')
        .replace(/[^a-z0-9-]/g, '')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
      return slug || 'uncategorised';
    }

    // Download a Blob directly (the existing download() wraps strings in a Blob).
    function downloadBlob(filename, blob) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 500);
    }

    // Toast — fixed bottom-right (raised above bottom tabs on mobile).
    function showToast(message, kind = 'info') {
      const accent = kind === 'error' ? 'var(--danger)' : kind === 'success' ? 'var(--accent)' : 'var(--accent-dim)';
      const isMobile = window.matchMedia('(max-width: 767px)').matches;
      const bottom = isMobile ? 'calc(80px + env(safe-area-inset-bottom, 0px))' : '20px';
      const t = document.createElement('div');
      t.style.cssText = `
        position: fixed; right: 16px; bottom: ${bottom}; z-index: 9999;
        max-width: min(360px, calc(100vw - 32px));
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--surface-raised);
        color: var(--text);
        font: 500 13px/1.4 'DM Sans', system-ui, sans-serif;
        box-shadow: var(--shadow-pop);
        border-left: 3px solid ${accent};
        animation: toastIn 220ms cubic-bezier(0.22, 1, 0.36, 1);
      `;
      t.textContent = message;
      document.body.appendChild(t);
      setTimeout(() => {
        t.style.transition = 'opacity 240ms, transform 240ms';
        t.style.opacity = '0';
        t.style.transform = 'translateY(8px)';
        setTimeout(() => t.remove(), 260);
      }, 4200);
      return t;
    }

    // Resolve the FY in play for Tax-tab operations (FY picker or derived from month)
    function taxActiveFY() {
      if (state.period === 'fy') return state.currentFY;
      const [y, m] = (state.currentMonth || '').split('-').map(Number);
      return m >= 7 ? y + 1 : y;
    }

    // ---- PDF builders — direct jsPDF text drawing ----
    // We previously rendered HTML via html2pdf (html2canvas + jsPDF). It shipped
    // empty content streams in practice (off-screen container height = 0 in
    // some browsers, so html2canvas snapshot was blank). Direct text drawing
    // produces vector, searchable, deterministic output.

    // Strip the currency symbol that Intl might render as a non-Latin-1 glyph
    // (jsPDF's built-in Helvetica only supports Latin-1). We want things like
    // "A$1,234.56" / "$1,234.56" / "NZ$12.00", not the odd "AUD 12.00".
    function pdfMoney(n, currency = 'AUD') {
      const num = Number(n) || 0;
      const sym = ({ AUD: 'A$', USD: '$', GBP: '£', EUR: '€', NZD: 'NZ$' })[currency] || '$';
      // £ / € are Latin-1; jsPDF handles them. Fallback to plain $ for anything else.
      const safeSym = /[£€$A-Z]/.test(sym) ? sym : '$';
      return `${safeSym}${num.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}`;
    }

    // Build a jsPDF document with a shared layout context.
    function pdfContext(doc) {
      const pageW = doc.internal.pageSize.getWidth();
      const pageH = doc.internal.pageSize.getHeight();
      const margin = 48;
      return {
        doc, pageW, pageH, margin,
        contentW: pageW - margin * 2,
        y: margin,
        page: 1,
      };
    }

    // Drawing helpers — all take and return/mutate the context `y` cursor.
    function pdfHeader(ctx, title, subtitle) {
      const { doc, pageW, margin } = ctx;
      doc.setFont('times', 'normal').setFontSize(22).setTextColor(28, 25, 23);
      doc.text(title, margin, margin + 16);
      doc.setFont('helvetica', 'normal').setFontSize(9).setTextColor(122, 115, 107);
      doc.text(subtitle, margin, margin + 32);
      doc.setDrawColor(207, 202, 192).setLineWidth(0.5);
      doc.line(margin, margin + 42, pageW - margin, margin + 42);
      ctx.y = margin + 60;
    }

    function pdfFooter(ctx) {
      const { doc, pageW, pageH, margin } = ctx;
      doc.setFont('helvetica', 'normal').setFontSize(8).setTextColor(138, 133, 128);
      const text = `Generated ${new Date().toLocaleString('en-AU')} · Ventra Ledger · Page ${ctx.page}`;
      doc.text(text, pageW / 2, pageH - margin / 2, { align: 'center' });
    }

    function pdfSectionTitle(ctx, text) {
      const { doc, margin } = ctx;
      doc.setFont('times', 'normal').setFontSize(13).setTextColor(28, 25, 23);
      doc.text(text, margin, ctx.y + 12);
      ctx.y += 20;
    }

    function pdfTile(ctx, x, w, label, value, { accent = false } = {}) {
      const { doc } = ctx;
      const h = 54;
      if (accent) doc.setFillColor(242, 236, 255).setDrawColor(221, 211, 245);
      else        doc.setFillColor(250, 250, 247).setDrawColor(229, 225, 216);
      doc.setLineWidth(0.5);
      doc.roundedRect(x, ctx.y, w, h, 5, 5, 'FD');
      doc.setFont('helvetica', 'normal').setFontSize(7.5).setTextColor(138, 133, 128);
      doc.text(label.toUpperCase(), x + 12, ctx.y + 16);
      doc.setFont('courier', 'normal').setFontSize(15).setTextColor(28, 25, 23);
      doc.text(value, x + 12, ctx.y + 40);
    }

    function pdfTilesRow(ctx, tiles) {
      const { margin, contentW } = ctx;
      const gap = 10;
      const w = (contentW - gap * (tiles.length - 1)) / tiles.length;
      tiles.forEach((t, i) => pdfTile(ctx, margin + (w + gap) * i, w, t.label, t.value, { accent: t.accent }));
      ctx.y += 54 + 16;
    }

    // Simple row-based table. `columns` = [{ header, x, width, align, mono }]
    function pdfTable(ctx, columns, rows, { headerRedrawOnPage = true, totalRow = null } = {}) {
      const { doc, margin, pageH } = ctx;
      const rowH = 16;
      const headerH = 18;
      const bottomPad = 30;

      const drawHeader = () => {
        doc.setFont('helvetica', 'bold').setFontSize(8).setTextColor(106, 101, 95);
        columns.forEach(c => doc.text(c.header.toUpperCase(), c.x, ctx.y + 10, { align: c.align || 'left' }));
        doc.setDrawColor(207, 202, 192).setLineWidth(0.6);
        doc.line(margin, ctx.y + 13, ctx.pageW - margin, ctx.y + 13);
        ctx.y += headerH;
      };

      drawHeader();

      doc.setFont('helvetica', 'normal').setFontSize(9).setTextColor(28, 25, 23);
      rows.forEach(r => {
        if (ctx.y + rowH > pageH - bottomPad) {
          pdfFooter(ctx);
          doc.addPage();
          ctx.page++;
          ctx.y = margin;
          if (headerRedrawOnPage) drawHeader();
          doc.setFont('helvetica', 'normal').setFontSize(9).setTextColor(28, 25, 23);
        }
        columns.forEach(c => {
          const v = String(r[c.key] ?? '');
          if (c.mono) doc.setFont('courier', 'normal'); else doc.setFont('helvetica', 'normal');
          const maxW = c.maxW || c.width - 4;
          const text = doc.splitTextToSize(v, maxW)[0] || '';
          doc.text(text, c.x, ctx.y + 11, { align: c.align || 'left' });
        });
        doc.setDrawColor(239, 236, 230).setLineWidth(0.3);
        doc.line(margin, ctx.y + rowH - 2, ctx.pageW - margin, ctx.y + rowH - 2);
        ctx.y += rowH;
      });

      if (totalRow) {
        if (ctx.y + rowH + 4 > pageH - bottomPad) {
          pdfFooter(ctx); doc.addPage(); ctx.page++; ctx.y = margin;
        }
        doc.setDrawColor(207, 202, 192).setLineWidth(0.8);
        doc.line(margin, ctx.y + 2, ctx.pageW - margin, ctx.y + 2);
        doc.setFont('helvetica', 'bold').setFontSize(9).setTextColor(28, 25, 23);
        columns.forEach(c => {
          const v = totalRow[c.key];
          if (v == null) return;
          if (c.mono) doc.setFont('courier', 'bold'); else doc.setFont('helvetica', 'bold');
          doc.text(String(v), c.x, ctx.y + 14, { align: c.align || 'left' });
        });
        ctx.y += rowH + 4;
      }
      ctx.y += 8;
    }

    function pdfEnsureSpace(ctx, needed) {
      if (ctx.y + needed > ctx.pageH - 30) {
        pdfFooter(ctx);
        ctx.doc.addPage();
        ctx.page++;
        ctx.y = ctx.margin;
      }
    }

    async function buildSummaryPdf({ fy, settings, totalIncome, totalExpenses, net, shareA, shareB, catRows, gstTotal, fyExpenses }) {
      const jsPDF = await ensureJsPDF();
      const doc = new jsPDF({ unit: 'pt', format: 'a4', compress: true });
      const ctx = pdfContext(doc);

      pdfHeader(ctx,
        `Ventra — FY${fy} Summary`,
        `${settings.partnerA} & ${settings.partnerB} · Jul ${fy - 1} - Jun ${fy} · 50/50 split${gstSuffix}`);

      pdfTilesRow(ctx, [
        { label: 'Income',     value: pdfMoney(totalIncome, cur) },
        { label: 'Expenses',   value: pdfMoney(totalExpenses, cur) },
        { label: 'Net profit', value: (net < 0 ? '-' : '') + pdfMoney(Math.abs(net), cur), accent: true },
      ]);

      pdfSectionTitle(ctx, 'Partner split - 50 / 50');
      pdfTilesRow(ctx, [
        { label: settings.partnerA, value: (shareA < 0 ? '-' : '') + pdfMoney(Math.abs(shareA), cur) },

      // Expenses by category table

        { key: 'count', header: 'Count',    x: pageW - margin - 230, width: 60,  align: 'right' },
        { key: 'total', header: 'Total',    x: pageW - margin - 90,  width: 90,  align: 'right', mono: true },
        { key: 'share', header: 'Share',    x: pageW - margin,       width: 60,  align: 'right' },

      const rows = catRows.map(r => ({
        cat: r.cat,
        count: r.count,
        total: pdfMoney(r.total, cur),

      pdfTable(ctx, columns, rows, {

      if (settings.gstEnabled) {

          { label: `Rate ${settings.gstRate}%`, value: pdfMoney(gstTotal, cur) },
        ]);
      }

      pdfFooter(ctx);
      return doc.output('blob');
    }

      pdfEnsureSpace(ctx, 120);
      pdfSectionTitle(ctx, 'Expenses — all entries');
      {

    async function actGenerateEofyPack() {
      const btn = document.querySelector('[data-action="eofy-pack"]');
      if (btn && btn.disabled) return;
      let toast;
      try {
        if (btn) {
          btn.disabled = true;
          btn.innerHTML = `<span class="spin">${icon('clock', 14)}</span> Generating pack…`;
        }
        toast = showToast('Building EOFY pack…', 'info');

        await ensureJSZip();
        const fy = taxActiveFY();
        const { expenses, income, uncollected, loans, settings } = state.data;
        const cur = settings.currency;

        const fyIncome      = income.filter(i => isoInFY(i.date, fy));
        const fyExpenses    = expenses.filter(e => isoInFY(e.date, fy));
        const fyUncollected = uncollected.filter(u => isoInFY(u.date, fy));
        const fyLoans       = loans.filter(l => isoInFY(l.date, fy));

        const totalIncome   = fyIncome.reduce((s, i) => s + parseAmount(i.amount), 0);
        const totalExpenses = fyExpenses.reduce((s, e) => s + parseAmount(e.amount), 0);
        const net    = totalIncome - totalExpenses;
        const shareA = net * 0.5;
        const shareB = net * 0.5;

        // GST total (component of gst-inclusive expenses)
        let gstTotal = 0;
        if (settings.gstEnabled) {
          for (const e of fyExpenses) {
            if (e.gstInclusive) gstTotal += parseAmount(e.amount) * (settings.gstRate / (100 + settings.gstRate));
          }
        }

        // Group expenses by category
        const byCat = new Map();
        for (const e of fyExpenses) {
          const c = e.category || 'Uncategorised';
          const prev = byCat.get(c) || { total: 0, count: 0, items: [] };
          prev.total += parseAmount(e.amount);
          prev.count += 1;
          prev.items.push(e);
          byCat.set(c, prev);
        }
        const catRows = [...byCat.entries()]
          .sort((a, b) => b[1].total - a[1].total)
          .map(([cat, v]) => ({ cat, total: v.total, count: v.count, pct: totalExpenses > 0 ? (v.total / totalExpenses) * 100 : 0 }));

        const zip = new JSZip();

        // 01 — Income CSV
        zip.file('01-income.csv', toCSVWithBOM(
          fyIncome.map(i => [i.source || '', i.date, parseAmount(i.amount).toFixed(2), i.notes || '', i.editedBy || '', i.editedAt || '']),
          ['Source', 'Date', 'Amount', 'Notes', 'Edited by', 'Edited at']
        ));

        // 02 — Expenses all
        const expHeaders = ['Vendor', 'Date', 'Amount', 'Category'];
        if (settings.gstEnabled) expHeaders.push('GST Component');
        expHeaders.push('Notes', 'Edited by', 'Edited at');
        const buildExpRow = (e) => {
          const row = [e.vendor || '', e.date, parseAmount(e.amount).toFixed(2), e.category || ''];
          if (settings.gstEnabled) {
            const gst = e.gstInclusive ? parseAmount(e.amount) * (settings.gstRate / (100 + settings.gstRate)) : 0;
            row.push(gst.toFixed(2));
          }
          row.push(e.notes || '', e.editedBy || '', e.editedAt || '');
          return row;
        };
        zip.file('02-expenses-all.csv', toCSVWithBOM(fyExpenses.map(buildExpRow), expHeaders));

        // 03 — Expenses by category/ (one CSV per non-empty category)
        for (const [cat, v] of byCat.entries()) {
          const fn = `03-expenses-by-category/${slugCategory(cat)}.csv`;
          zip.file(fn, toCSVWithBOM(v.items.map(buildExpRow), expHeaders));
        }

        // 06 — Uncollected receivables
        zip.file('06-uncollected.csv', toCSVWithBOM(
          fyUncollected.map(u => [
            u.client || '', u.date, parseAmount(u.amount).toFixed(2),
            u.collected ? 'collected' : 'outstanding',
            u.assignedTo || '', u.notes || '',
            u.editedBy || '', u.editedAt || ''
          ]),
          ['Client', 'Date issued', 'Amount', 'Status', 'Assigned to', 'Notes', 'Edited by', 'Edited at']
        ));

        // 07 — Loans register
        zip.file('07-loans.csv', toCSVWithBOM(
          fyLoans.map(l => [
            l.counterparty || '', l.date, parseAmount(l.amount).toFixed(2),
            l.direction || '', l.notes || '',
            l.editedBy || '', l.editedAt || ''
          ]),
          ['Counterparty', 'Date', 'Amount', 'Direction', 'Notes', 'Edited by', 'Edited at']
        ));

        // 04 + 05 — PDFs
        if (btn) btn.innerHTML = `<span class="spin">${icon('clock', 14)}</span> Rendering PDFs…`;
        const dataForPdfs = { fy, settings, totalIncome, totalExpenses, net, shareA, shareB, catRows, gstTotal, fyIncome, fyExpenses, fyUncollected, fyLoans };
        const summaryBlob = await buildSummaryPdf(dataForPdfs);
        zip.file('04-fy-summary.pdf', summaryBlob);
        const detailedBlob = await buildDetailedPdf(dataForPdfs);
        zip.file('05-fy-detailed.pdf', detailedBlob);

        // Zip and download
        if (btn) btn.innerHTML = `<span class="spin">${icon('clock', 14)}</span> Packaging…`;
        const zipBlob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE', compressionOptions: { level: 6 } });
        const filename = `ventra-eofy-pack-FY${fy}.zip`;
        downloadBlob(filename, zipBlob);

        if (toast) toast.remove();
        showToast(`Downloaded ${filename}`, 'success');
      } catch (err) {
        console.error('EOFY pack failed:', err);
        if (toast) toast.remove();
        showToast(`Could not generate EOFY pack: ${err.message}`, 'error');
      } finally {
        if (btn) {
          btn.disabled = false;
          render(); // restore the normal button content
        }
      }
    }

    // ============ Settings ============
    function viewSettings() {
      const { settings } = state.data;

      const partnersCard = card(`
        <div class="flex items-start justify-between gap-3 mb-4">
          <h2 class="text-sm font-medium text-stone-900">Partners</h2>
          <span class="text-[10px] tracking-[0.1em] uppercase text-stone-500">50 / 50 locked</span>
        </div>
        <form data-settings-form class="grid grid-cols-1 md:grid-cols-2 gap-4" onsubmit="return false;">
          <div>
            ${label('Partner A name')}
            ${textField({ value: settings.partnerA, field: 'partnerA' })}
          </div>
          <div>
            ${label('Partner B name')}
            ${textField({ value: settings.partnerB, field: 'partnerB' })}
          </div>
          <div class="md:col-span-2">
            ${label('Currency')}
            ${dropdown({
              id: 'settings-currency',
              value: settings.currency,
              options: CURRENCY_OPTIONS,
              field: 'currency'
            })}
          </div>
        </form>
        <div class="mt-5 flex justify-end">
          ${button({ children: 'Save settings', variant: 'accent', action: 'save-settings' })}
        </div>
      `, 'p-6');

      const gstCard = card(`
        <h2 class="text-sm font-medium text-stone-900 mb-1">GST</h2>
        <p class="text-sm text-stone-500 mb-4">Only turn this on if the business is registered for GST. When off, GST columns and totals are hidden everywhere.</p>
        <form data-gst-form class="grid grid-cols-1 md:grid-cols-2 gap-4" onsubmit="return false;">
          <div>
            <label class="flex items-center gap-3 px-4 py-2.5 text-sm bg-white rounded-2xl cursor-pointer" style="${shadowField}">
              <input type="checkbox" data-field="gstEnabled" class="accent-stone-900" ${settings.gstEnabled ? 'checked' : ''} />
              <span class="text-stone-900">GST registered</span>
            </label>
          </div>
          <div>
            ${label('Rate (%)')}
            ${numberField({ id: 'settings-gst-rate', value: String(settings.gstRate || 10), field: 'gstRate', prefix: '', step: 1 })}
          </div>
        </form>
        <div class="mt-4 flex justify-end">
          ${button({ children: 'Save GST settings', variant: 'accent', action: 'save-gst' })}
        </div>
      `, 'p-6');

      const userCard = card(`
        <h2 class="text-sm font-medium text-stone-900 mb-1">Your name on this device</h2>
        <p class="text-sm text-stone-500 mb-4">
          Stamps entries you add or edit with your name so your partner can see who did what.
          Stored on this device only — <strong>not synced</strong>. Each person should set their own name on their own device.
        </p>
        <form data-user-form class="grid grid-cols-1 md:grid-cols-3 gap-3" onsubmit="return false;">
          <div class="md:col-span-2">
            ${textField({ value: state.userName, field: 'userName', placeholder: 'e.g. Dan' })}
          </div>
          <div class="flex items-stretch">
            ${button({ children: 'Save', variant: 'accent', action: 'save-username', className: 'w-full' })}
          </div>
        </form>
        ${state.userName ? `<div class="text-xs text-stone-500 mt-3">Currently signed in as <strong class="text-stone-800">${esc(state.userName)}</strong>.</div>` : ''}
      `, 'p-6');

      const dataRecoveryCard = card(`
        <h2 class="text-sm font-medium text-stone-900 mb-1">Data recovery</h2>
        <p class="text-sm text-stone-500 mb-2">
          For the accountant at EOFY, use <strong class="text-stone-800">Tax → Generate EOFY Pack</strong> —
          it produces one ZIP with CSVs and PDFs scoped to a single financial year.
        </p>
        <p class="text-sm text-stone-500 mb-4">
          If something is broken, or you need a raw full-data dump across every FY, use
          <strong class="text-stone-800">Export JSON</strong> below. It reads straight from
          <code class="px-1 py-0.5 rounded">localStorage</code> and works even if cloud sync is
          broken or mis-configured.
        </p>
        <div class="flex flex-wrap gap-2">
          ${button({ children: `${icon('download', 14)} Export JSON (escape hatch)`, variant: 'secondary', action: 'export-json-raw' })}
          <input type="file" accept=".json" class="hidden" data-json-input />
          ${button({ children: `${icon('upload', 14)} Import JSON`, variant: 'secondary', action: 'import-json' })}
        </div>
      `, 'p-6');

      const dangerCard = card(`
        <h2 class="text-sm font-medium text-red-900 mb-1">Danger zone</h2>
        <p class="text-sm text-stone-500 mb-4">Wipe all ledger data on this device. Export a backup first if you might need it.</p>
        ${button({ children: `${icon('trash', 14)} Reset all data`, variant: 'danger', action: 'reset-all' })}
      `, 'p-6');

      return `
        <div class="space-y-6 max-w-3xl">
          <div>
            <div class="text-[11px] tracking-[0.15em] uppercase text-stone-500 mb-2">Configuration</div>
            <h1 class="font-serif text-4xl font-light text-stone-900 leading-none">Settings</h1>
          </div>
          ${partnersCard}
          ${gstCard}
          ${userCard}
          ${dataRecoveryCard}
          ${dangerCard}
        </div>`;
    }

    // Read direct from localStorage regardless of current in-memory state —
    // escape hatch if sync got confused or the page is misbehaving.
    function actExportJsonRaw() {
      try {
        flushSave(); // write any pending debounced save first
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : state.data;
        const payload = JSON.stringify(parsed, null, 2);
        download(`ventra-ledger-${todayISO()}.json`, payload, 'application/json');
      } catch (err) {
        // Last-resort fallback — dump in-memory state
        alert('Could not read localStorage; dumping in-memory ledger instead.');
        download(`ventra-ledger-${todayISO()}.json`, JSON.stringify(state.data, null, 2), 'application/json');
      }
    }

    async function actImportJson(file) {
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        if (!parsed || typeof parsed !== 'object') throw new Error('Invalid');
        const merge = confirm('Click OK to MERGE with existing data.\nClick Cancel to REPLACE all current data.');
        if (merge) {
          setData(d => migrate({
            expenses: [...d.expenses, ...(parsed.expenses || [])],
            income: [...d.income, ...(parsed.income || [])],
            uncollected: [...d.uncollected, ...(parsed.uncollected || [])],
            loans: [...d.loans, ...(parsed.loans || [])],
            settings: d.settings
          }));
          alert('Imported and merged.');
        } else {
          setData(() => migrate(parsed));
          alert('Imported and replaced.');
        }
      } catch (err) {
        alert('Could not read that file.');
      }
    }

    function actSaveSettings() {
      const form = document.querySelector('[data-settings-form]');
      if (!form) return;
      const partnerA = (readField(form, 'partnerA') || '').trim() || 'Partner A';
      const partnerB = (readField(form, 'partnerB') || '').trim() || 'Partner B';
      const currency = readField(form, 'currency') || 'AUD';
      // Split is hardcoded 50/50 by design — not editable.
      setData(d => ({ ...d, settings: { ...d.settings, partnerA, partnerB, splitA: 50, splitB: 50, currency } }));
    }

    function actSaveGst() {
      const form = document.querySelector('[data-gst-form]');
      if (!form) return;
      const enabled = !!form.querySelector('[data-field="gstEnabled"]').checked;
      const rate = Math.max(0, Math.min(100, Number(readField(form, 'gstRate')) || 10));
      setData(d => ({ ...d, settings: { ...d.settings, gstEnabled: enabled, gstRate: rate } }));
    }

    function actSaveUsername() {
      const form = document.querySelector('[data-user-form]');
      if (!form) return;
      const name = (readField(form, 'userName') || '').trim();
      state.userName = name;
      saveUser(name);
      render();
    }

    function actResetAll() {
      if (!confirm('Delete ALL ledger data on this device? This can not be undone.')) return;
      if (!confirm('Really delete? Your partner\'s copy (if synced) is not affected.')) return;
      setData(d => migrate({ ...defaultData, settings: d.settings }));
    }

    const VIEW_RENDERERS = {
      overview: viewOverview,
      expenses: viewExpenses,
      income: viewIncome,
      uncollected: viewUncollected,
      loans: viewLoans,
      tax: viewTax,
      settings: viewSettings
    };

    // ============ Render ============
    const root = document.getElementById('root');

    function render() {
      const renderer = VIEW_RENDERERS[state.tab] || viewOverview;
      root.innerHTML = layout(renderer());
    }

    // ============ Dropdown open/close (DOM-driven) ============
    function closeAllDropdowns(exceptEl) {
      document.querySelectorAll('[data-dropdown][data-open="true"]').forEach(w => {
        if (w !== exceptEl) closeDropdown(w);
      });
    }
    function openDropdown(wrap) {
      wrap.dataset.open = 'true';
      const menu = wrap.querySelector('[data-dd-menu]');
      const trigger = wrap.querySelector('.dd-trigger');
      if (menu) menu.style.display = 'block';
      if (trigger) trigger.setAttribute('aria-expanded', 'true');
      const toFocus = wrap.querySelector('[role="option"][aria-selected="true"]') || wrap.querySelector('[role="option"]');
      if (toFocus) setTimeout(() => toFocus.focus({ preventScroll: true }), 0);
    }
    function closeDropdown(wrap) {
      wrap.dataset.open = 'false';
      const menu = wrap.querySelector('[data-dd-menu]');
      const trigger = wrap.querySelector('.dd-trigger');
      if (menu) menu.style.display = 'none';
      if (trigger) trigger.setAttribute('aria-expanded', 'false');
    }

    // ============ Event delegation ============
    // Single click handler dispatches on [data-action], delegating to `dispatch`
    // so internal actions (like dd-select) can forward to another handler.
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      dispatch(el.dataset.action, el);
    });

    function dispatch(action, el) {
      // Tab navigation
      if (action === 'tab') {
        state.tab = el.dataset.tab;
        state.editingId = null;
        closeAllDropdowns();
        window.scrollTo(0, 0);
        return render();
      }

      // Period mode toggle
      if (action === 'set-period-mode') {
        state.period = el.dataset.mode;
        closeAllDropdowns();
        return render();
      }

      // Dropdown open/close (DOM-driven, no render)
      if (action === 'dd-toggle') {
        const id = el.dataset.dd;
        const wrap = document.querySelector(`[data-dropdown="${CSS.escape(id)}"]`);
        if (!wrap) return;
        closeAllDropdowns(wrap);
        if (wrap.dataset.open === 'true') closeDropdown(wrap);
        else openDropdown(wrap);
        return;
      }

      // Dropdown option selection — update DOM + hidden input, then forward
      // any `data-emit` action (e.g. pick-month, pick-fy, set-filter).
      if (action === 'dd-select') {
        const id = el.dataset.dd;
        const wrap = document.querySelector(`[data-dropdown="${CSS.escape(id)}"]`);
        const value = el.dataset.value;
        const labelText = el.dataset.label;
        if (wrap) {
          wrap.dataset.value = value;
          const hidden = wrap.querySelector('input[type="hidden"][data-field]');
          if (hidden) hidden.value = value;
          const labelEl = wrap.querySelector('[data-dd-label]');
          if (labelEl) {
            labelEl.textContent = labelText;
            labelEl.style.color = 'var(--text)';
          }
          wrap.querySelectorAll('[role="option"]').forEach(opt => {
            const isSel = opt.dataset.value === value;
            opt.setAttribute('aria-selected', String(isSel));
            opt.classList.toggle('dd-active', isSel);
            const check = opt.querySelector('.dd-check');
            if (check) check.style.visibility = isSel ? 'visible' : 'hidden';
          });
          closeDropdown(wrap);
          const trigger = wrap.querySelector('.dd-trigger');
          if (trigger) trigger.focus({ preventScroll: true });
        }
        if (el.dataset.emit) dispatch(el.dataset.emit, el);
        return;
      }

      // Period picker selections (fired via dd-select forwarding)
      if (action === 'pick-month') { state.currentMonth = el.dataset.value; return render(); }
      if (action === 'pick-fy')    { state.currentFY = Number(el.dataset.value); return render(); }

      // Number field +/– step
      if (action === 'num-step') {
        const target = document.getElementById(el.dataset.target);
        if (!target) return;
        const delta = Number(el.dataset.delta) || 0;
        const cur = parseAmount(target.value);
        const next = Math.max(0, cur + delta);
        target.value = next.toFixed(2);
        target.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }

      // Ledger: add / edit / delete / filter / sort / csv
      if (action === 'add-entry') return actAddEntry(el.dataset.kind);
      if (action === 'start-edit') { state.editingId = el.dataset.id; return render(); }
      if (action === 'cancel-edit') { state.editingId = null; return render(); }
      if (action === 'save-edit') return actSaveEdit(el.dataset.kind, el.dataset.id);
      if (action === 'delete-entry') return actDeleteEntry(el.dataset.kind, el.dataset.id);

      if (action === 'set-filter') {
        const ddid = el.dataset.dd || '';
        const kind = ddid.replace(/^filter-/, '');
        const key = kind === 'expense' ? 'filterExpense' : 'filterIncome';
        state[key] = el.dataset.value;
        return render();
      }

      if (action === 'sort') {
        const kind = el.dataset.kind;
        const field = el.dataset.field;
        const key = kind === 'expense' ? 'sortExpense' : 'sortIncome';
        const cur = state[key];
        state[key] = cur.field === field
          ? { field, dir: cur.dir === 'asc' ? 'desc' : 'asc' }
          : { field, dir: 'asc' };
        return render();
      }

      if (action === 'csv-export') return actCsvExport(el.dataset.kind);
      if (action === 'csv-import') {
        const fi = document.querySelector(`[data-csv-input="${el.dataset.kind}"]`);
        if (fi) fi.click();
        return;
      }

      // Uncollected
      if (action === 'add-uncollected') return actAddUncollected();
      if (action === 'toggle-collected') return actToggleCollected(el.dataset.id);
      if (action === 'delete-uncollected') return actDeleteUncollected(el.dataset.id);

      // Loans
      if (action === 'add-loan') return actAddLoan();
      if (action === 'delete-loan') return actDeleteLoan(el.dataset.id);

      // Tax
      if (action === 'tax-csv-export') return actTaxCsvExport();
      if (action === 'tax-print') return actTaxPrint();
      if (action === 'eofy-pack') return actGenerateEofyPack();

      // Settings
      if (action === 'save-settings') return actSaveSettings();
      if (action === 'save-gst') return actSaveGst();
      if (action === 'save-username') return actSaveUsername();
      if (action === 'reset-all') return actResetAll();
      if (action === 'export-json-raw') return actExportJsonRaw();
      if (action === 'import-json') {
        const fi = document.querySelector('[data-json-input]');
        if (fi) fi.click();
        return;
      }
    }

    // ============ Dropdown keyboard navigation ============
    document.addEventListener('keydown', (e) => {
      // If a dropdown trigger is focused and closed, Enter/Space/ArrowDown opens it.
      const trigger = e.target.closest && e.target.closest('.dd-trigger');
      if (trigger) {
        const wrap = trigger.closest('[data-dropdown]');
        const isOpen = wrap && wrap.dataset.open === 'true';
        if (!isOpen && (e.key === 'Enter' || e.key === ' ' || e.key === 'ArrowDown')) {
          e.preventDefault();
          if (wrap) { closeAllDropdowns(wrap); openDropdown(wrap); }
          return;
        }
      }

      // If any dropdown is open, intercept navigation keys.
      const openDd = document.querySelector('[data-dropdown][data-open="true"]');
      if (!openDd) return;

      if (e.key === 'Escape') {
        e.preventDefault();
        closeDropdown(openDd);
        const trig = openDd.querySelector('.dd-trigger');
        if (trig) trig.focus({ preventScroll: true });
        return;
      }
      if (e.key === 'Tab') {
        closeDropdown(openDd);
        return;
      }
      if (e.key === 'Enter' || e.key === ' ') {
        const opt = document.activeElement && document.activeElement.closest && document.activeElement.closest('[role="option"]');
        if (opt && openDd.contains(opt)) {
          e.preventDefault();
          opt.click();
          return;
        }
      }
      if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
        e.preventDefault();
        const options = Array.from(openDd.querySelectorAll('[role="option"]'));
        const cur = options.indexOf(document.activeElement);
        const next = e.key === 'ArrowDown'
          ? (cur < 0 ? 0 : (cur + 1) % options.length)
          : (cur <= 0 ? options.length - 1 : cur - 1);
        options[next] && options[next].focus({ preventScroll: false });
        return;
      }
      if (e.key === 'Home') {
        e.preventDefault();
        const first = openDd.querySelector('[role="option"]');
        first && first.focus({ preventScroll: false });
        return;
      }
      if (e.key === 'End') {
        e.preventDefault();
        const all = openDd.querySelectorAll('[role="option"]');
        const last = all[all.length - 1];
        last && last.focus({ preventScroll: false });
        return;
      }
    });

    // File input change handler (CSV + JSON imports)
    document.addEventListener('change', (e) => {
      const csvInput = e.target.closest('[data-csv-input]');
      if (csvInput) {
        const kind = csvInput.dataset.csvInput;
        const file = csvInput.files && csvInput.files[0];
        if (file) actCsvImport(kind, file);
        csvInput.value = '';
        return;
      }
      const jsonInput = e.target.closest('[data-json-input]');
      if (jsonInput) {
        const file = jsonInput.files && jsonInput.files[0];
        if (file) actImportJson(file);
        jsonInput.value = '';
      }
    });

    // Enter-to-submit in add forms (feels more like the React original)
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const form = e.target.closest && e.target.closest('[data-add-form]');
      if (!form) return;
      // Don't submit on Enter inside a <select> or textarea
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
      e.preventDefault();
      const kind = form.dataset.addForm;
      actAddEntry(kind);
    });

    // Outside-click closes any open custom dropdown
    document.addEventListener('mousedown', (e) => {
      if (!e.target.closest('[data-dropdown]')) {
        closeAllDropdowns();
      }
    });

    // Initial render
    render();
  </script>
</body>
</html>
