    // Read direct from localStorage regardless of current in-memory state —
    // escape hatch if sync got confused or the page is misbehaving.
    function actExportJsonRaw() {
      try {
        flushSave(); // write any pending debounced save first
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : state.data;
        const payload = JSON.stringify(parsed, null, 2);
        download(`ventra-ledger-${todayISO()}.json`, payload, 'application/json');
      } catch (err) {
        // Last-resort fallback — dump in-memory state
        alert('Could not read localStorage; dumping in-memory ledger instead.');
        download(`ventra-ledger-${todayISO()}.json`, JSON.stringify(state.data, null, 2), 'application/json');
      }
    }

    async function actImportJson(file) {
      if (!file) return;
      try {
        const parsed = JSON.parse(await file.text());
        if (!parsed || typeof parsed !== 'object') throw new Error('Invalid');
        const merge = confirm('Click OK to MERGE with existing data.\nClick Cancel to REPLACE all current data.');
        if (merge) {
          setData(d => migrate({
            expenses: [...d.expenses, ...(parsed.expenses || [])],
            income: [...d.income, ...(parsed.income || [])],
            uncollected: [...d.uncollected, ...(parsed.uncollected || [])],
            loans: [...d.loans, ...(parsed.loans || [])],
            settings: d.settings
          }));
          alert('Imported and merged.');
        } else {
          setData(() => migrate(parsed));
          alert('Imported and replaced.');
        }
      } catch (err) {
        alert('Could not read that file.');
      }
    }

    function actSaveSettings() {
      const form = document.querySelector('[data-settings-form]');
      if (!form) return;
      const partnerA = (readField(form, 'partnerA') || '').trim() || 'Partner A';
      const partnerB = (readField(form, 'partnerB') || '').trim() || 'Partner B';
      let splitA = Math.max(0, Math.min(100, Number(readField(form, 'splitA')) || 0));
      const currency = readField(form, 'currency') || 'AUD';
      setData(d => ({ ...d, settings: { ...d.settings, partnerA, partnerB, splitA, splitB: 100 - splitA, currency } }));
    }

    function actSaveGst() {
      const form = document.querySelector('[data-gst-form]');
      if (!form) return;
      const enabled = !!form.querySelector('[data-field="gstEnabled"]').checked;
      const rate = Math.max(0, Math.min(100, Number(readField(form, 'gstRate')) || 10));
      setData(d => ({ ...d, settings: { ...d.settings, gstEnabled: enabled, gstRate: rate } }));
    }

    function actSaveUsername() {
      const form = document.querySelector('[data-user-form]');
      if (!form) return;
      const name = (readField(form, 'userName') || '').trim();
      state.userName = name;
      saveUser(name);
      render();
    }

    function actResetAll() {
      if (!confirm('Delete ALL ledger data on this device? This can not be undone.')) return;
      if (!confirm('Really delete? Your partner\'s copy (if synced) is not affected.')) return;
      setData(d => migrate({ ...defaultData, settings: d.settings }));
    }

    const VIEW_RENDERERS = {
      overview: viewOverview,
      expenses: viewExpenses,
      income: viewIncome,
      uncollected: viewUncollected,
      loans: viewLoans,
      tax: viewTax,
      settings: viewSettings
    };

    // ============ Render ============
    const root = document.getElementById('root');

    function render() {
      const renderer = VIEW_RENDERERS[state.tab] || viewOverview;
      root.innerHTML = layout(renderer());
    }

    // ============ Event delegation ============
    // Single click handler dispatches on [data-action].
    document.addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const action = el.dataset.action;

      // Tab navigation
      if (action === 'tab') {
        state.tab = el.dataset.tab;
        state.openDropdown = null;
        state.editingId = null;
        window.scrollTo(0, 0);
        return render();
      }

      // Period mode toggle
      if (action === 'set-period-mode') {
        state.period = el.dataset.mode;
        state.openDropdown = null;
        return render();
      }

      // Dropdown toggle
      if (action === 'toggle-dropdown') {
        const id = el.dataset.dropdownId;
        state.openDropdown = (state.openDropdown === id) ? null : id;
        return render();
      }

      // Period picker selections
      if (action === 'pick-month') {
        state.currentMonth = el.dataset.value;
        state.openDropdown = null;
        return render();
      }
      if (action === 'pick-fy') {
        state.currentFY = Number(el.dataset.value);
        state.openDropdown = null;
        return render();
      }

      // Number field +/– step
      if (action === 'num-step') {
        const target = document.getElementById(el.dataset.target);
        if (!target) return;
        const delta = Number(el.dataset.delta) || 0;
        const cur = parseAmount(target.value);
        const next = Math.max(0, cur + delta);
        target.value = next.toFixed(2);
        target.dispatchEvent(new Event('input', { bubbles: true }));
        return;
      }

      // Ledger: add / edit / delete / filter / sort / csv
      if (action === 'add-entry') return actAddEntry(el.dataset.kind);
      if (action === 'start-edit') { state.editingId = el.dataset.id; return render(); }
      if (action === 'cancel-edit') { state.editingId = null; return render(); }
      if (action === 'save-edit') return actSaveEdit(el.dataset.kind, el.dataset.id);
      if (action === 'delete-entry') return actDeleteEntry(el.dataset.kind, el.dataset.id);

      if (action === 'set-filter') {
        const ddid = el.dataset.dropdownId || '';
        const kind = ddid.replace(/^filter-/, '');
        const key = kind === 'expense' ? 'filterExpense' : 'filterIncome';
        state[key] = el.dataset.value;
        state.openDropdown = null;
        return render();
      }

      if (action === 'sort') {
        const kind = el.dataset.kind;
        const field = el.dataset.field;
        const key = kind === 'expense' ? 'sortExpense' : 'sortIncome';
        const cur = state[key];
        state[key] = cur.field === field
          ? { field, dir: cur.dir === 'asc' ? 'desc' : 'asc' }
          : { field, dir: 'asc' };
        return render();
      }

      if (action === 'csv-export') return actCsvExport(el.dataset.kind);
      if (action === 'csv-import') {
        const fi = document.querySelector(`[data-csv-input="${el.dataset.kind}"]`);
        if (fi) fi.click();
        return;
      }

      // Uncollected
      if (action === 'add-uncollected') return actAddUncollected();
      if (action === 'toggle-collected') return actToggleCollected(el.dataset.id);
      if (action === 'delete-uncollected') return actDeleteUncollected(el.dataset.id);

      // Loans
      if (action === 'add-loan') return actAddLoan();
      if (action === 'delete-loan') return actDeleteLoan(el.dataset.id);

      // Tax
      if (action === 'tax-csv-export') return actTaxCsvExport();
      if (action === 'tax-print') return actTaxPrint();

      // Settings
      if (action === 'save-settings') return actSaveSettings();
      if (action === 'save-gst') return actSaveGst();
      if (action === 'save-username') return actSaveUsername();
      if (action === 'reset-all') return actResetAll();
      if (action === 'export-json-raw') return actExportJsonRaw();
      if (action === 'import-json') {
        const fi = document.querySelector('[data-json-input]');
        if (fi) fi.click();
        return;
      }
    });

    // File input change handler (CSV + JSON imports)
    document.addEventListener('change', (e) => {
      const csvInput = e.target.closest('[data-csv-input]');
      if (csvInput) {
        const kind = csvInput.dataset.csvInput;
        const file = csvInput.files && csvInput.files[0];
        if (file) actCsvImport(kind, file);
        csvInput.value = '';
        return;
      }
      const jsonInput = e.target.closest('[data-json-input]');
      if (jsonInput) {
        const file = jsonInput.files && jsonInput.files[0];
        if (file) actImportJson(file);
        jsonInput.value = '';
      }
    });

    // Enter-to-submit in add forms (feels more like the React original)
    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      const form = e.target.closest && e.target.closest('[data-add-form]');
      if (!form) return;
      // Don't submit on Enter inside a <select> or textarea
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
      e.preventDefault();
      const kind = form.dataset.addForm;
      actAddEntry(kind);
    });

    // Outside-click closes any open custom dropdown
    document.addEventListener('mousedown', (e) => {
      if (state.openDropdown && !e.target.closest('[data-dropdown]')) {
        state.openDropdown = null;
        render();
      }
    });

    // Initial render
    render();
  </script>
</body>
</html>
